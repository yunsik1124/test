<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>강철의 난: 무림수호맹 V72 - 모바일 가로모드 반응형 최적화</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: 'Malgun Gothic', sans-serif;
            user-select: none;
            -webkit-user-select: none; /* 모바일 텍스트 드래그 방지 */
            touch-action: none; /* 모바일 브라우저 기본 제스처 방지 */
        }

        #gameContainer {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        canvas {
            background-color: #e8e6d9;
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 16 / 9;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            cursor: pointer;
        }

        #uiLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hud-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            border: 2px solid #f1c40f;
            padding: 10px 20px;
            border-radius: 8px;
            pointer-events: auto;
            display: flex;
            gap: 20px;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        .coin-text {
            font-size: 26px;
            font-weight: bold;
            color: #f1c40f;
            text-shadow: 1px 1px 3px #000;
        }

        .hud-btn {
            background: linear-gradient(180deg, #e67e22 0%, #d35400 100%);
            color: white;
            border: 1px solid #f39c12;
            padding: 8px 16px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.2s;
            text-shadow: 1px 1px 2px #000;
        }

            .hud-btn:hover {
                background: linear-gradient(180deg, #f39c12 0%, #e67e22 100%);
                transform: translateY(-2px);
                box-shadow: 0 4px 8px rgba(243, 156, 18, 0.4);
            }

        #upgradePopup {
            display: none;
            position: relative;
            pointer-events: auto;
            width: 90%;
            height: 90%;
            max-width: 1600px;
            background: #1a1a1a;
            border: 3px solid #f1c40f;
            border-radius: 12px;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 0 50px rgba(0,0,0,0.95);
            z-index: 100;
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

            .popup-header h1 {
                margin: 0;
                color: #f1c40f;
                font-size: 32px;
                text-shadow: 2px 2px 4px #000;
            }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        @keyframes blinkWarning {
            50% {
                opacity: 0.5;
                color: #fff;
            }
        }

        #gameOverWarning {
            display: none;
            color: #ff4757;
            font-size: 18px;
            font-weight: bold;
            animation: blinkWarning 1s infinite;
            text-shadow: 1px 1px 3px #000;
        }

        .close-btn {
            background: #2980b9;
            color: white;
            border: none;
            font-size: 20px;
            padding: 8px 25px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

            .close-btn:hover {
                background: #3498db;
                transform: scale(1.05);
            }

        .hard-reset-btn {
            background: #c0392b;
            color: white;
            border: none;
            font-size: 16px;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.2s;
        }

            .hard-reset-btn:hover {
                background: #e74c3c;
            }

        .popup-body {
            display: flex;
            flex: 1;
            gap: 20px;
            overflow: hidden;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #111;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

            ::-webkit-scrollbar-thumb:hover {
                background: #f1c40f;
            }

        .tree-section {
            flex: 3;
            background: #222;
            border-radius: 8px;
            border: 1px solid #444;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            align-content: flex-start;
        }

        .skill-branch {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 45%;
            background: rgba(255,255,255,0.03);
            padding: 20px 15px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .skill-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
            padding-bottom: 8px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            width: 90%;
            text-align: center;
            text-shadow: 1px 1px 2px #000;
        }

        .skill-desc {
            font-size: 13px;
            color: #bdc3c7;
            margin-bottom: 20px;
            text-align: center;
        }

        .node-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .node-line {
            width: 4px;
            height: 25px;
            background: #555;
            box-shadow: 1px 0 2px #000;
        }

        .node {
            width: 110px;
            height: 110px;
            background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%);
            border: 3px solid #7f8c8d;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
            z-index: 2;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

            .node:hover:not(.locked) {
                border-color: #f1c40f;
                transform: scale(1.08) translateY(-2px);
                box-shadow: 0 6px 15px rgba(241, 196, 15, 0.4);
            }

            .node.max {
                border-color: #27ae60;
                box-shadow: 0 0 15px rgba(39, 174, 96, 0.6);
                background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            }

            .node.locked {
                filter: grayscale(100%) brightness(0.4);
                cursor: not-allowed;
                border-color: #111;
            }

                .node.locked::after {
                    content: '🔒';
                    position: absolute;
                    font-size: 30px;
                    opacity: 0.8;
                }

            .node span {
                color: white;
                font-size: 15px;
                font-weight: bold;
                text-align: center;
                line-height: 1.1;
                word-break: keep-all;
                padding: 0 4px;
                text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            }

            .node .lvl {
                color: #f1c40f;
                font-size: 14px;
                margin-top: 4px;
                font-weight: bold;
                background: rgba(0,0,0,0.5);
                padding: 2px 8px;
                border-radius: 10px;
            }

        .hero-section {
            flex: 1;
            background: #222;
            border-radius: 8px;
            border: 1px solid #444;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

            .hero-section h2 {
                color: #f1c40f;
                margin-top: 0;
                text-align: center;
                border-bottom: 2px solid rgba(255,255,255,0.1);
                padding-bottom: 15px;
                margin-bottom: 20px;
            }

        .hero-card {
            background: linear-gradient(180deg, #34495e 0%, #2c3e50 100%);
            border: 2px solid #555;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }

            .hero-card.equipped {
                border-color: #2ecc71;
                box-shadow: 0 0 20px rgba(46, 204, 113, 0.4);
            }

            .hero-card h3 {
                margin: 0 0 8px 0;
                font-size: 22px;
            }

            .hero-card p {
                font-size: 13px;
                color: #bdc3c7;
                margin: 0 0 15px 0;
                line-height: 1.4;
                word-break: keep-all;
            }

        .hero-btn {
            width: 100%;
            padding: 12px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }

        .btn-buy {
            background: #e67e22;
            color: white;
            border: 1px solid #d35400;
        }

        .btn-equipped {
            background: #7f8c8d;
            color: white;
            cursor: default;
            border: 1px solid #555;
        }

        /* ========================================================
           모바일 가로모드 (Landscape & Small Screen) 반응형 최적화
        ======================================================== */
        @media screen and (max-height: 600px), screen and (max-width: 900px) {
            .hud-panel {
                top: 5px;
                right: 5px;
                padding: 5px 10px;
                gap: 10px;
            }

            .coin-text {
                font-size: 16px;
            }

            .hud-btn {
                font-size: 12px;
                padding: 4px 8px;
            }

            #upgradePopup {
                width: 98%;
                height: 98%;
                padding: 10px;
            }

            .popup-header {
                padding-bottom: 5px;
                margin-bottom: 10px;
            }

                .popup-header h1 {
                    font-size: 18px;
                }

            .header-controls {
                gap: 10px;
            }

                .header-controls div {
                    font-size: 14px !important;
                    padding: 4px 8px !important;
                }

            .close-btn, .hard-reset-btn {
                font-size: 12px;
                padding: 6px 10px;
            }

            .tree-section {
                padding: 10px;
                gap: 10px;
            }

            .skill-branch {
                width: 48%;
                padding: 10px 5px;
                margin-bottom: 10px;
            }

            .skill-title {
                font-size: 14px;
                margin-bottom: 2px;
            }

            .skill-desc {
                font-size: 10px;
                margin-bottom: 10px;
            }

            .node {
                width: 60px;
                height: 60px;
                border-width: 2px;
            }

            .node-line {
                height: 15px;
                width: 2px;
            }

            .node span {
                font-size: 10px;
                padding: 0 2px;
            }

            .node .lvl {
                font-size: 10px;
                padding: 1px 4px;
                margin-top: 2px;
            }

            .node.locked::after {
                font-size: 20px;
            }

            .hero-section {
                padding: 10px;
                flex: 0.8;
            }

                .hero-section h2 {
                    font-size: 16px;
                    padding-bottom: 5px;
                    margin-bottom: 10px;
                }

            .hero-card {
                padding: 10px;
                margin-bottom: 10px;
            }

                .hero-card h3 {
                    font-size: 16px;
                    margin-bottom: 5px;
                }

                .hero-card p {
                    font-size: 10px;
                    margin-bottom: 8px;
                }

            .hero-btn {
                font-size: 12px;
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1920" height="1080"></canvas>
        <div id="uiLayer">
            <div class="hud-panel">
                <div class="coin-text">💰 <span id="coinCount">500</span></div>
                <button class="hud-btn" onclick="togglePopup(true)">수호 관청 (비급/영웅)</button>
            </div>
            <div id="upgradePopup">
                <div class="popup-header">
                    <div style="display:flex; align-items:center; gap:15px;">
                        <button class="hard-reset-btn" onclick="hardResetData()">모두 초기화</button>
                        <h1>무림 수호 관청</h1>
                    </div>
                    <div class="header-controls">
                        <div id="gameOverWarning">⚠️ 전사했소! 남은 코인은 전부 소멸되니 비급을 연마하고 재도전(F5) 하시오!</div>
                        <div style="color:white; font-size:24px; font-weight:bold; background:rgba(0,0,0,0.5); padding:8px 15px; border-radius:8px;">보유 코인: 💰 <span id="popupCoin">500</span></div>
                        <button class="close-btn" onclick="togglePopup(false)">전장으로 복귀 X</button>
                    </div>
                </div>
                <div class="popup-body">
                    <div class="tree-section" id="treeContainer"></div>
                    <div class="hero-section" id="heroContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = 1920; const H = 1080;

        let coins = 500;
        let currentStage = 1;
        let isSpeedUp = false;
        let h0BuffTimer = 0;

        const skillCategories = [
            { id: '수호 공통 내공', color: '#2ecc71', desc: '모든 수호자의 기초 생존력 강화', stats: ['hp', 'def', 'regenHP', 'respawnReduc'] },
            { id: '무극 초식 연마', color: '#3498db', desc: '역할군별 공격력 및 공속 극대화', stats: ['atkSpeed', 'atkMelee', 'atkRanged', 'costReduc'] },
            { id: '암살 치명 비전', color: '#e74c3c', desc: '모든 수호자의 치명타 및 보상 수련', stats: ['critRate', 'critDmg', 'healInc', 'coinGain'] },
            { id: '전설 영웅 비전', color: '#f39c12', desc: '전설 영웅의 무공 쿨타임 및 위력 극한 돌파', stats: ['heroCd', 'heroEffect', 'heroSwapCost'] }
        ];

        const statDetails = {
            'hp': { name: '기초 내공', short: '최대체력', base: 1500, desc: '배치된 모든 아군의 최대 체력 한도를 깊게 늘려주오.' },
            'def': { name: '호신강기', short: '피해감소', base: 2000, desc: '적에게 공격받을 때, 피해량을 고정 수치만큼 경감시켜 주오.' },
            'regenHP': { name: '천인합일', short: '초당회복', base: 5000, desc: '전장의 모든 아군이 매초 일정한 내공(체력)을 스스로 회복하오.' },
            'respawnReduc': { name: '운기조식', short: '부활단축', base: 4000, desc: '전사한 영웅이 대기소에서 다시 일어서는 시간(쿨타임)을 대폭 줄여주오.' },
            'atkSpeed': { name: '무영각', short: '공격속도', base: 3000, desc: '모든 아군의 공격 속도 및 초식 쿨타임이 비약적으로 단축되오.' },
            'atkMelee': { name: '외가권투', short: '근접피해', base: 4500, desc: '근접 딜러와 탱커 등 타격계 영웅들의 피해량을 증폭시키오.' },
            'atkRanged': { name: '이기어검', short: '원거리피해', base: 6000, desc: '궁수, 암기 등 원거리 투사체의 위력과 폭발 피해를 높여주오.' },
            'costReduc': { name: '보급 원활', short: '배치할인', base: 5000, desc: '대기소에서 영웅을 전장으로 호출할 때 지불하는 코인을 할인받소.' },
            'critRate': { name: '급소 타격', short: '치명확률', base: 8000, desc: '모든 종류의 공격에서 치명타가 발생할 확률을 훌쩍 높여주오.' },
            'critDmg': { name: '파천황', short: '치명피해', base: 12000, desc: '치명타 적중 시 뿜어져 나오는 추가 피해 배율을 극대화하오.' },
            'healInc': { name: '신단 섭취', short: '회복증폭', base: 1000, desc: '의선, 독선 등 힐러 계열 영웅들의 아군 체력 회복량을 뻥튀기하오.' },
            'coinGain': { name: '전리품 노획', short: '코인증가', base: 6000, desc: '기계 마신 무리를 쓰러뜨렸을 때 노획하는 현상금 코인량이 증가하오.' },
            'heroCd': { name: '천기 누설', short: '강림쿨감', base: 15000, desc: '전설 영웅 강림(필살기)의 재사용 대기시간을 크게 단축하오.' },
            'heroEffect': { name: '마신 심판', short: '강림강화', base: 20000, desc: '강림 시의 피해량, 넉백, 시간정지 등 부가 효과를 증폭시키오.' },
            'heroSwapCost': { name: '시공간 조율', short: '교체할인', base: 10000, desc: '전설 영웅을 전장에 부를 때 소모되는 교체 비용을 영구적으로 절감하오.' }
        };

        let upgrades = { '수호 공통 내공': {}, '무극 초식 연마': {}, '암살 치명 비전': {}, '전설 영웅 비전': {} };
        skillCategories.forEach(cat => { cat.stats.forEach(s => upgrades[cat.id][s] = 0); });

        let heroes = [
            { id: 'h0', name: '백면검귀', desc: '일시 정지 및 아군 공속 2배', color: '#95a5a6' },
            { id: 'h1', name: '장삼풍', desc: '적 넉백 및 아군 광역 회복', color: '#3498db' },
            { id: 'h2', name: '남만야왕', desc: '선택 라인 궤멸 및 아군 무적', color: '#e67e22' },
            { id: 'h3', name: '독고구검', desc: '전체 적 체력 비례 피해', color: '#e74c3c' },
            { id: 'h4', name: '천마강림', desc: '전체 적 피해 및 일시 정지', color: '#8e44ad' }
        ];
        let equippedHero = 'h0';

        function getCategoryForKey(key) {
            for (let cat of skillCategories) { if (cat.stats.includes(key)) return cat.id; } return null;
        }

        function saveGame() {
            const data = { upgrades, equippedHero, currentStage, coins };
            localStorage.setItem('murimGuardiansSaveV71', JSON.stringify(data));
        }

        function loadGame() {
            const saved = localStorage.getItem('murimGuardiansSaveV71');
            if (saved) {
                const data = JSON.parse(saved);
                upgrades = data.upgrades || upgrades;
                equippedHero = data.equippedHero || 'h0';
                currentStage = data.currentStage || 1;
            }
            coins = 500;
        }

        function hardResetData() {
            if (confirm("모든 데이터를 포기하고 처음부터 다시 하시겠소?")) {
                localStorage.removeItem('murimGuardiansSaveV71');
                location.reload();
            }
        }

        loadGame();

        let baseEnergy = 100;
        let frameCount = 0;
        let selectedInvenIdx = -1;
        let timeStopFrames = 0;
        let invincibleFrames = 0;
        let isHeroTargeting = false;
        let shakeFrames = 0;
        let gameState = 'playing';
        let mouseX = 0; let mouseY = 0;
        let laneEffect = { laneId: -1, timer: 0 };

        let currentWave = 0;
        const waveDurations = [2250, 3000, 3750, 4500, 6250];
        const waveQuotas = [30, 60, 85, 120, 150];
        let waveTimer = waveDurations[0];
        let enemiesSpawned = 0;
        let showWaveWarning = 0;
        let waveState = 'spawning';
        let waveWaitTimer = 0;
        let bossSpawned = false;

        let enemies = []; let projectiles = []; let floatingTexts = [];

        let deck = [
            { id: 4, name: '정파검사', role: '근접딜러', cost: 40, attackType: 'melee', range: 180, damage: 35, color: '#27ae60', cd: 0, maxCd: 19, hp: 200, maxHp: 200, state: 'ready', timer: 0, knockback: false, showRangeTimer: 0, renderOffsetX: 0, jumpAnim: 0, lungeDist: 0, strikeDirX: 1, strikeDirY: 0 },

            { id: 1, name: '정파궁수', role: '원거리', cost: 100, attackType: 'ranged', projType: 'parabola', range: 580, damage: 25, color: '#3498db', cd: 0, maxCd: 25, hp: 60, maxHp: 60, state: 'ready', timer: 0, accuracy: 0.8, aoe: false, showRangeTimer: 0, renderOffsetX: 0, jumpAnim: 0 },
            { id: 6, name: '당문암기', role: '원거리/맹독', cost: 120, attackType: 'ranged', projType: 'straight', range: 1015, damage: 15, color: '#8e44ad', cd: 0, maxCd: 21, hp: 70, maxHp: 70, state: 'ready', timer: 0, accuracy: 1.0, showRangeTimer: 0, poison: true, renderOffsetX: 0, jumpAnim: 0, friendlyFire: false },
            { id: 5, name: '사파벽력탄', role: '원거리/폭발', cost: 180, attackType: 'ranged', projType: 'parabola', range: 600, damage: 150, color: '#e74c3c', cd: 0, maxCd: 58, hp: 80, maxHp: 80, state: 'ready', timer: 0, accuracy: 0.6, aoe: true, friendlyFire: true, showRangeTimer: 0, renderOffsetX: 0, jumpAnim: 0 }
        ];

        deck.sort((a, b) => a.cost - b.cost);

        const rows = 5; const cols = 10;
        const startX = 100; const startY = 220;
        const rowHeight = 135; const colWidth = 145;

        }

        const heroSlot = { x: 1470, y: 900, w: 420, h: 160, cd: 0, maxCd: 1500, activeTimer: 0, maxActive: 166 };

        function updateUI() {
            document.getElementById('coinCount').innerText = coins;
            document.getElementById('popupCoin').innerText = coins;
        }

        function togglePopup(show) {
            document.getElementById('upgradePopup').style.display = show ? 'flex' : 'none';
            if (show) {
                document.getElementById('gameOverWarning').style.display = (gameState === 'gameover' || baseEnergy <= 0) ? 'block' : 'none';
                if (gameState !== 'gameover') gameState = 'paused';

                if (gameState !== 'gameover') {
                    gameState = 'playing';
                }
            }
        }

        function buyUpgrade(catId, statKey) {
            let cat = skillCategories.find(c => c.id === catId);
            let statIdx = cat.stats.indexOf(statKey);
            let isLocked = statIdx > 0 && upgrades[catId][cat.stats[statIdx - 1]] < 5;
            if (isLocked) return;

            let lvl = upgrades[catId][statKey];
            let cost = statDetails[statKey].base;

            if (lvl < 10 && coins >= cost) {
                coins -= cost; upgrades[catId][statKey]++;
                saveGame();
                updateUI(); renderPopup();
            }
        }

        function getHeroEquipCost() {
            let discount = getBase('heroSwapCost', 0);
            return Math.max(0, 500 - discount);
        }

        function buyEquipHero(heroId) {
            if (equippedHero === heroId) return;

            let cost = getHeroEquipCost();
            if (coins >= cost) {
                coins -= cost; equippedHero = heroId;
                saveGame(); updateUI(); renderPopup();
            } else { alert(`교체 비용(${cost} 💰)이 부족하오!`); }
        }

        function renderPopup() {

            skillCategories.forEach(cat => {
                let html = `<div class="skill-branch">

                cat.stats.forEach((statKey, idx) => {
                    let lvl = upgrades[cat.id][statKey];
                    let detail = statDetails[statKey];
                    let cost = detail.base;
                    let isMax = lvl >= 10;
                    let isLocked = idx > 0 && upgrades[cat.id][cat.stats[idx - 1]] < 5;

                    html += `<div class="node-wrapper">
                                    ${idx !== 0 ? '<div class="node-line"></div>' : ''}

                                        <div class="lvl">${lvl}/10</div>

            const heroCon = document.getElementById('heroContainer');
            heroCon.innerHTML = '<h2>전설 영웅 강림</h2>';
            let currentSwapCost = getHeroEquipCost();

            heroes.forEach(h => {
                let isEq = equippedHero === h.id;
                let btnHtml = isEq ? `<button class="hero-btn btn-equipped" disabled>장착 중</button>` :
                    `<button class="hero-btn btn-buy" ${coins < currentSwapCost ? 'disabled style="background:#555;cursor:not-allowed"' : ''} onclick="buyEquipHero('${h.id}')">${currentSwapCost}💰 교체</button>`;
                heroCon.innerHTML += `<div class="hero-card ${isEq ? 'equipped' : ''}">
                                            <h3 style="color:${h.color}">${h.name}</h3>
                                            <p>${h.desc}</p>
                                            ${btnHtml}
                                          </div>`;
            });
        }

        function getBase(key, baseVal) {
            let catId = getCategoryForKey(key);
            if (!catId) return baseVal;
            let lvl = upgrades[catId][key];
            if (!lvl) return baseVal;

            if (key === 'healInc') return baseVal + (lvl * 5);
            if (key === 'atkSpeed') return lvl * 0.05;
            if (key === 'atkMelee' || key === 'atkRanged') return baseVal + (lvl * 5);
            if (key === 'hp') return baseVal + (lvl * 30);
            if (key === 'def') return lvl * 3;
            if (key === 'critRate') return 0.2 + (lvl * 0.05);
            if (key === 'critDmg') return 2.0 + (lvl * 0.2);
            if (key === 'regenHP') return baseVal + (lvl * 3);
            if (key === 'respawnReduc') return Math.max(50, baseVal - (lvl * 12));
            if (key === 'costReduc') return lvl * 0.04;
            if (key === 'coinGain') return lvl * 0.1;
            if (key === 'heroCd') return lvl * 0.05;
            if (key === 'heroEffect') return 1 + (lvl * 0.2);
            if (key === 'heroSwapCost') return lvl * 50;
            return baseVal;
        }

        function getActualCost(charData) {
            let discount = getBase('costReduc', 0);
            return Math.max(10, Math.floor(charData.cost * (1 - discount)));
        }

        function drawText(text, x, y, size, color = "white", align = "center") {
            ctx.save(); ctx.fillStyle = color; ctx.font = `bold ${size}px 'Malgun Gothic', sans-serif`;
            ctx.textAlign = align; ctx.textBaseline = "middle";
            ctx.strokeStyle = "rgba(0,0,0,0.9)";

            ctx.strokeText(text, Math.round(x), Math.round(y));
            ctx.fillText(text, Math.round(x), Math.round(y));
            ctx.restore();
        }

        function createFloatingText(x, y, text, color, isCrit) {
            floatingTexts.push({ x: x, y: y, text: text, color: color, life: 20, maxLife: 20, size: isCrit ? 44 : 28, isCrit: isCrit });
        }

        function triggerHeroSkill(heroId, targetLaneId) {
            let eff = getBase('heroEffect', 1);
            let cdReduc = getBase('heroCd', 0);

            heroSlot.activeTimer = Math.floor(166 * eff);
            heroSlot.cd = Math.floor(heroSlot.maxCd * (1 - cdReduc));
            shakeFrames = 16;
            let activeHeroData = heroes.find(h => h.id === heroId);

            if (heroId === 'h0') {
                timeStopFrames = Math.floor(166 * eff);
                h0BuffTimer = Math.floor(300 * eff);
                createFloatingText(W / 2, H / 2, "아군 공속 2배!", activeHeroData.color, true);
            } else if (heroId === 'h1') {
                timeStopFrames = Math.floor(166 * eff);
                enemies.forEach(e => { e.kbTimer = Math.floor(45 * eff); e.kbSpeed = 150 / 45; });
                fieldSlots.forEach(fs => {
                    if (fs.char) {
                        let healAmt = Math.floor(getBase('hp', fs.char.maxHp) * 0.4);
                        fs.char.hp = Math.min(getBase('hp', fs.char.maxHp), fs.char.hp + healAmt);
                        createFloatingText(fs.x, fs.y - 30, `+${healAmt}`, "lime", true);
                    }
                });
            } else if (heroId === 'h2') {
                invincibleFrames = Math.floor(166 * eff);
                laneEffect = { laneId: targetLaneId, timer: Math.floor(75 * eff) };
                enemies.forEach(en => {
                    if (en.lane.id === targetLaneId) {
                        if (en.type === 'boss') {
                            let dmg = Math.floor(en.hp * Math.min(1, 0.3 * eff)); en.hp -= dmg;
                            createFloatingText(en.x, en.y - 80, `-${dmg}`, activeHeroData.color, true);
                        } else {
                            en.hp = 0; createFloatingText(en.x, en.y - 80, `절명!`, activeHeroData.color, true);
                        }
                    }
                });
            } else if (heroId === 'h3') {
                timeStopFrames = 0;
                enemies.forEach(en => {
                    let dmg = Math.floor(en.hp * Math.min(1, (en.type === 'boss' ? 0.1 : 0.5) * eff));
                    en.hp -= dmg; en.hitAnim = 6;
                    if (en.type !== 'boss') { en.kbTimer = Math.floor(45 * eff); en.kbSpeed = 150 / 45; }
                    createFloatingText(en.x, en.y - 80, `-${dmg}`, activeHeroData.color, true);
                });
            } else if (heroId === 'h4') {
                timeStopFrames = Math.floor(166 * eff);
                enemies.forEach(en => {
                    let dmg = Math.floor(en.hp * Math.min(1, (en.type === 'boss' ? 0.2 : 0.5) * eff));
                    en.hp -= dmg; en.hitAnim = 6;
                    createFloatingText(en.x, en.y - 80, `-${dmg}`, activeHeroData.color, true);
                });

        // --- 마우스 및 터치 이벤트 통합 매핑 ---
        function updateMousePos(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            mouseX = (clientX - rect.left) * (W / rect.width);
            mouseY = (clientY - rect.top) * (H / rect.height);
        }

        function handleInteract(e) {
            if (e.target !== canvas || gameState !== 'playing') return;

            if (Math.hypot(mouseX - 50, mouseY - 80) <= 30) {
                isSpeedUp = !isSpeedUp;
                return;
            }

            if (isHeroTargeting) {
                let clickedLaneId = -1;
                for (let r = 0; r < rows; r++) { if (Math.abs(mouseY - lanes[r].y) < rowHeight / 2) { clickedLaneId = r; break; } }
                if (clickedLaneId !== -1) triggerHeroSkill('h2', clickedLaneId);
                isHeroTargeting = false;
                return;
            }

            if (mouseY > 880) {
                for (let i = 0; i < deck.length; i++) {
                    const bx = 40 + (i * 140);
                    if (mouseX >= bx && mouseX <= bx + 120 && mouseY >= 910 && mouseY <= 1070) {
                        if (deck[i].state === 'ready') selectedInvenIdx = (selectedInvenIdx === i) ? -1 : i;
                        return;
                    }
                }
                if (mouseX >= heroSlot.x && mouseX <= heroSlot.x + heroSlot.w && mouseY >= heroSlot.y && mouseY <= heroSlot.y + heroSlot.h) {
                    if (heroSlot.cd <= 0 && heroSlot.activeTimer <= 0) {
                        let activeHeroData = heroes.find(h => h.id === equippedHero);
                        if (activeHeroData.id === 'h2') isHeroTargeting = true; else triggerHeroSkill(activeHeroData.id, null);
                    }
                    return;
                }
                return;
            }

            for (let i = 0; i < fieldSlots.length; i++) {

                        }
                    }
                    return;
                }
            }
        }

        // 데스크톱 이벤트
        canvas.addEventListener('mousemove', (e) => updateMousePos(e.clientX, e.clientY));

        // 모바일 터치 이벤트

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); // 더블 탭 확대 방지
            if (e.touches.length > 0) updateMousePos(e.touches[0].clientX, e.touches[0].clientY);
            handleInteract(e);

        const fpsInterval = 1000 / 60;
        let then = performance.now();
        let framesThisSecond = 0;
        let currentFPS = 0;
        let lastFpsTime = performance.now();

        function gameLoop(timestamp) {
            requestAnimationFrame(gameLoop);
            let now = timestamp || performance.now();
            let elapsed = now - then;

            if (elapsed > fpsInterval) {
                then = now - (elapsed % fpsInterval);
                framesThisSecond++;
                if (now - lastFpsTime >= 1000) { currentFPS = framesThisSecond; framesThisSecond = 0; lastFpsTime = now; }

                let loops = isSpeedUp ? 2 : 1;
                for (let loopIdx = 0; loopIdx < loops; loopIdx++) {
                    if (gameState === 'paused') break;
                    if (baseEnergy <= 0 && gameState !== 'gameover') { gameState = 'gameover'; togglePopup(true); break; }

                    ctx.clearRect(0, 0, W, H);
                    ctx.save();

                    if (shakeFrames > 0) { ctx.translate((Math.random() - 0.5) * 20, (Math.random() - 0.5) * 20); shakeFrames--; }
                    ctx.fillStyle = timeStopFrames > 0 || heroSlot.activeTimer > 0 ? "#1e272e" : "#e8e6d9"; ctx.fillRect(0, 0, W, H);

                    ctx.strokeStyle = "#ff4757"; ctx.lineWidth = 4; ctx.setLineDash([10, 10]);
                    ctx.beginPath(); ctx.moveTo(startX - 30, 150); ctx.lineTo(startX - 30 + (rows - 1) * skewX, 900); ctx.stroke(); ctx.setLineDash([]);

                    if (gameState === 'playing') {
                        if (h0BuffTimer > 0) h0BuffTimer--;

                        let activeHeroObj = heroes.find(h => h.id === equippedHero);
                        if (heroSlot.activeTimer > 0) {
                            heroSlot.activeTimer--;
                            ctx.fillStyle = "rgba(142, 68, 173, 0.2)"; ctx.fillRect(0, 0, W, H);
                            drawText(`${activeHeroObj.name} 강림!!`, W / 2, H / 2, 120, activeHeroObj.color);
                        }

                        if (isHeroTargeting) {
                            let hoverLaneId = -1;
                            for (let r = 0; r < rows; r++) { if (Math.abs(mouseY - lanes[r].y) < rowHeight / 2) { hoverLaneId = r; break; } }
                            ctx.fillStyle = "rgba(230, 126, 34, 0.2)"; ctx.fillRect(0, 0, W, H);
                            drawText("터치하여 심판할 라인을 선택하시오!", W / 2, 120, 44, "#e67e22");
                            if (hoverLaneId !== -1) { let lane = lanes[hoverLaneId]; ctx.fillStyle = "rgba(230, 126, 34, 0.5)"; ctx.fillRect(0, lane.y - 40, W, 80); }
                        }

                        if (laneEffect.timer > 0) {
                            let lane = lanes[laneEffect.laneId];
                            ctx.fillStyle = "rgba(230, 126, 34, " + (laneEffect.timer / 75 * 0.5) + ")"; ctx.fillRect(0, lane.y - 40, W, 80);
                            laneEffect.timer--;
                        }

                        lanes.forEach(lane => {
                            ctx.strokeStyle = timeStopFrames > 0 ? "rgba(255,255,255,0.05)" : lane.color;
                            ctx.lineWidth = 60 * lane.scale; ctx.lineCap = "butt";
                            ctx.beginPath(); ctx.moveTo(lane.startX, lane.y); ctx.lineTo(lane.endX, lane.y); ctx.stroke();
                            ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth = 2; ctx.setLineDash([15, 15]);
                            ctx.beginPath(); ctx.moveTo(lane.startX, lane.y); ctx.lineTo(lane.endX, lane.y); ctx.stroke(); ctx.setLineDash([]);

                            let portalRadius = 40 + Math.sin(frameCount * 0.1) * 5;
                            ctx.fillStyle = "rgba(142, 68, 173, 0.8)";
                            ctx.beginPath(); ctx.ellipse(lane.startX, lane.y, 20, portalRadius, 0, 0, Math.PI * 2); ctx.fill();
                            ctx.fillStyle = "black"; ctx.beginPath(); ctx.ellipse(lane.startX, lane.y, 10, portalRadius - 15, 0, 0, Math.PI * 2); ctx.fill();
                        });

                        ctx.fillStyle = "rgba(0, 0, 0, 0.7)"; ctx.fillRect(10, 10, 150, 40);
                        drawText(`[ FPS : ${currentFPS} ]`, 85, 30, 20, "#2ecc71");

                        ctx.fillStyle = isSpeedUp ? "rgba(231, 76, 60, 0.9)" : "rgba(127, 140, 141, 0.8)";
                        ctx.beginPath(); ctx.arc(50, 80, 30, 0, Math.PI * 2); ctx.fill();
                        ctx.strokeStyle = "white"; ctx.lineWidth = 2; ctx.stroke();
                        drawText("X2", 50, 80, 22, "white");

                        ctx.fillStyle = "rgba(0,0,0,0.7)"; ctx.fillRect(W / 2 - 500, 15, 1000, 60);
                        drawText(`[ 스테이지 ${currentStage} ]`, W / 2 - 350, 45, 30, "#2ecc71");

                        let remainSec = Math.ceil(waveTimer / 60);
                        let waveStr = currentWave === 4 ? "마신왕 결전" : `제 ${currentWave + 1}파 진격 (${remainSec}초)`;
                        drawText(waveStr, W / 2, 45, 34, "#f39c12");
                        drawText(`에너지: ${baseEnergy}% 危`, W / 2 + 350, 45, 30, "#ff4757");

                        if (invincibleFrames > 0) drawText("무적 발동!", W / 2, H / 2 - 150, 80, "gold");

                        let activeBoss = enemies.find(e => e.type === 'boss');
                        if (activeBoss) {
                            ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(W / 2 - 300, 90, 600, 40);
                            ctx.fillStyle = "#c0392b"; ctx.fillRect(W / 2 - 296, 94, 592 * (activeBoss.hp / activeBoss.maxHp), 32);
                            drawText(`기계 마신왕 (${Math.floor(activeBoss.hp)} / ${activeBoss.maxHp})`, W / 2, 110, 28, "white");
                        }

                        fieldSlots.forEach(s => {
                            let isHovered = Math.hypot(mouseX - s.x, mouseY - s.y) < 60;
                            ctx.fillStyle = "rgba(0,0,0,0.15)"; ctx.beginPath(); ctx.ellipse(s.x, s.y, 45, 25, 0, 0, Math.PI * 2); ctx.fill();

                            if (selectedInvenIdx !== -1 && !s.char && isHovered && !isHeroTargeting) {
                                ctx.strokeStyle = "lime"; ctx.lineWidth = 4; ctx.stroke();
                                let charData = deck[selectedInvenIdx]; let range = charData.range;
                                let fillColor = charData.attackType === 'heal' ? "rgba(46, 204, 113, 0.3)" : "rgba(231, 76, 60, 0.3)";
                                let strokeColor = charData.attackType === 'heal' ? "rgba(46, 204, 113, 0.9)" : "rgba(231, 76, 60, 0.9)";

                                ctx.fillStyle = fillColor; ctx.strokeStyle = strokeColor; ctx.lineWidth = 3;

                                if (charData.attackType === 'heal' || (charData.attackType === 'melee' && charData.role !== '탱커')) {
                                    ctx.beginPath(); ctx.arc(s.x, s.y, range, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
                                } else {
                                    ctx.fillRect(s.x - range, s.y - 35, range * 2, 70); ctx.strokeRect(s.x - range, s.y - 35, range * 2, 70);
                                }
                            }

                            if (s.char) {
                                if (timeStopFrames <= 0 && frameCount % 25 === 0) {
                                    let regenAmount = getBase('regenHP', 0);

                                ctx.translate(p.x, p.y); ctx.rotate(frameCount * 0.4); ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(20, 0); ctx.lineTo(0, 20); ctx.lineTo(-20, 0); ctx.closePath(); ctx.fill();
                            } else if (p.char && p.char.projType === 'beam') {
                                ctx.translate(p.x, p.y); ctx.fillStyle = "rgba(0, 255, 255, 0.9)"; ctx.beginPath(); ctx.ellipse(0, 0, 45, 12, 0, 0, Math.PI * 2); ctx.fill();
                            } else { ctx.beginPath(); ctx.arc(p.x, p.y, 14, 0, Math.PI * 2); ctx.fill(); }
                            ctx.restore();

                            if (isHit) {
                                if (p.type === 'heal_parabola') {
                                    if (p.target.state === 'deployed') { p.target.hp = Math.min(getBase('hp', p.target.maxHp), p.target.hp + p.heal); createFloatingText(p.tx, p.ty - 20, `+${p.heal}`, "#2ecc71", true); }
                                } else if (p.type === 'enemyProj') {
                                    let hitSlots = fieldSlots.filter(fs => fs.char && Math.hypot(fs.x - p.tx, fs.y - p.ty) < 60);
                                    if (hitSlots.length > 0) {
                                        hitSlots.sort((a, b) => b.x - a.x); let hitSlot = hitSlots[0];
                                        let fHit = Math.max(1, p.damage - getBase('def', 0));
                                        if (invincibleFrames > 0) fHit = 0;
                                        hitSlot.char.hp -= fHit; createFloatingText(hitSlot.x, hitSlot.y - 30, `-${fHit}`, "#e74c3c", true);
                                        if (invincibleFrames > 0) createFloatingText(hitSlot.x, hitSlot.y - 40, "무적!", "gold", false);
                                        if (hitSlot.char.hp <= 0 && invincibleFrames <= 0) { hitSlot.char.state = 'dead'; hitSlot.char.timer = getBase('respawnReduc', 250); hitSlot.char.hp = getBase('hp', hitSlot.char.maxHp); hitSlot.char = null; }
                                    }
                                } else if (p.type !== 'pierce') {
                                    if (p.isMiss) { ctx.fillStyle = "rgba(100, 100, 100, 0.5)"; ctx.beginPath(); ctx.arc(p.tx, p.ty, 40, 0, Math.PI * 2); ctx.fill(); createFloatingText(p.tx, p.ty, "Miss", "#aaa", false); }
                                    else {
                                        let finalDmg = p.isCrit ? Math.floor(p.baseDmg * getBase('critDmg', 0)) : p.baseDmg;
                                        if (p.isCrit) shakeFrames = 8;
                                        if (p.char.aoe) {
                                            let explosionRadius = 180;
                                            enemies.forEach(e => {
                                                if (Math.hypot(e.x - p.tx, e.y - p.ty) < explosionRadius) { e.hp -= finalDmg; e.hitAnim = 6; if (p.char.poison) e.poisoned = true; createFloatingText(e.x, e.y - 30, finalDmg, p.isCrit ? "#ff3333" : "white", p.isCrit); }
                                            });
                                            if (p.char.friendlyFire) {
                                                fieldSlots.forEach(fs => {
                                                    if (fs.char && Math.hypot(fs.x - p.tx, fs.y - p.ty) < explosionRadius) {
                                                        let friendlyDmg = Math.floor(finalDmg * 0.2); if (invincibleFrames > 0) friendlyDmg = 0;
                                                        fs.char.hp -= friendlyDmg; createFloatingText(fs.x, fs.y - 50, `-${friendlyDmg}`, "#ff0000", false);
                                                        if (fs.char.hp <= 0 && invincibleFrames <= 0) { fs.char.state = 'dead'; fs.char.timer = getBase('respawnReduc', 250); fs.char.hp = getBase('hp', fs.char.maxHp); fs.char = null; }
                                                    }
                                                });
                                            }
                                            ctx.fillStyle = "rgba(231, 76, 60, 0.6)"; ctx.beginPath(); ctx.arc(p.tx, p.ty, explosionRadius, 0, Math.PI * 2); ctx.fill();
                                        } else {
                                            let hitEnemy = null; let enemiesInLane = enemies.filter(e => e.lane.id === p.laneId);
                                            if (enemiesInLane.length > 0) { enemiesInLane.sort((a, b) => Math.abs(a.x - p.tx) - Math.abs(b.x - p.tx)); hitEnemy = enemiesInLane[0]; }
                                            if (hitEnemy) {
                                                hitEnemy.hp -= finalDmg; hitEnemy.hitAnim = 6;
                                                if (p.char.poison) hitEnemy.poisoned = true;
                                                if (p.char.slow && hitEnemy.type !== 'boss') hitEnemy.slowTimer = 75;
                                                createFloatingText(hitEnemy.x, hitEnemy.y - 30, finalDmg, p.isCrit ? "#ff3333" : "white", p.isCrit);
                                            }
                                        }
                                    }
                                }
                                projectiles.splice(i, 1);
                            }
                        }

                        for (let i = floatingTexts.length - 1; i >= 0; i--) {
                            let ft = floatingTexts[i]; ft.y -= 3; ft.life--; ctx.globalAlpha = Math.max(0, ft.life / ft.maxLife); drawText(ft.isCrit ? `CRIT! ${ft.text}` : ft.text, ft.x, ft.y, ft.size, ft.color); ctx.globalAlpha = 1.0; if (ft.life <= 0) floatingTexts.splice(i, 1);
                        }

                        ctx.fillStyle = "#1a1a1a"; ctx.fillRect(0, 880, W, 200); ctx.strokeStyle = "#555"; ctx.lineWidth = 4; ctx.strokeRect(0, 880, W, 200);
                        drawText("수호맹 대기소", 100, 905, 24, "#aaa", "left");

                        deck.forEach((char, i) => {
                            const bx = 40 + (i * 140); const slotWidth = 125; const slotHeight = 160;
                            ctx.strokeStyle = (selectedInvenIdx === i) ? "gold" : "#333"; ctx.lineWidth = 4; ctx.strokeRect(bx, 910, slotWidth, slotHeight);

                            let slotInnerW = slotWidth - 4; let slotInnerH = 110;
                            let actualCost = getActualCost(char);

                            if (char.state === 'deployed') {
                                ctx.fillStyle = "#111"; ctx.fillRect(bx + 2, 912, slotInnerW, slotInnerH);
                                drawText("배치됨", bx + (slotWidth / 2), 965, 26, "#555");
                            } else if (char.state === 'waiting' || char.state === 'dead') {
                                char.timer--; if (char.timer <= 0) char.state = 'ready';
                                ctx.fillStyle = char.color; ctx.fillRect(bx + 2, 912, slotInnerW, slotInnerH);
                                let maxT = char.state === 'dead' ? getBase('respawnReduc', 250) : 125;
                                let ratio = char.timer / maxT;
                                ctx.fillStyle = "rgba(0, 0, 0, 0.75)"; ctx.fillRect(bx + 2, 912, slotInnerW, slotInnerH * ratio);
                                drawText(char.state === 'dead' ? "운기조식" : "대기중", bx + (slotWidth / 2), 965, 24, "#ff4757");
                            } else {
                                char.hp = getBase('hp', char.maxHp);
                                ctx.fillStyle = char.color; ctx.fillRect(bx + 2, 912, slotInnerW, slotInnerH);
                                ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(bx + 2, 912, slotInnerW, 30);
                                drawText(`💰 ${actualCost}`, bx + (slotWidth / 2), 927, 18, coins >= actualCost ? "#f1c40f" : "#e74c3c");
                            }

                            drawText(char.name, bx + (slotWidth / 2), 1025, 22, (char.state === 'ready') ? "white" : "#7f8c8d");
                            drawText(char.role, bx + (slotWidth / 2), 1055, 20, "#f1c40f");

                            if (char.state === 'ready' && char.hp < getBase('hp', char.maxHp)) {
                                ctx.fillStyle = "red"; ctx.fillRect(bx + 15, 1075, slotWidth - 30, 6);
                                ctx.fillStyle = "lime"; ctx.fillRect(bx + 15, 1075, (slotWidth - 30) * (char.hp / getBase('hp', char.maxHp)), 6);
                            }
                        });

                        ctx.strokeStyle = "#555"; ctx.lineWidth = 3; ctx.strokeRect(heroSlot.x, heroSlot.y, heroSlot.w, heroSlot.h);
                        ctx.fillStyle = activeHeroObj.color; ctx.fillRect(heroSlot.x + 20, heroSlot.y + 30, 100, 100);
                        drawText(activeHeroObj.name, heroSlot.x + 270, heroSlot.y + 45, 32, "white");

                        if (heroSlot.cd > 0 || heroSlot.activeTimer > 0) {
                            let ratio = heroSlot.activeTimer > 0 ? (heroSlot.activeTimer / heroSlot.maxActive) : (1 - heroSlot.cd / heroSlot.maxCd);
                            ctx.fillStyle = heroSlot.activeTimer > 0 ? "red" : "yellow"; ctx.fillRect(heroSlot.x + 140, heroSlot.y + 110, 250 * ratio, 15);
                            drawText(heroSlot.activeTimer > 0 ? "심판의 일격!!" : "내공 축적 중...", heroSlot.x + 270, heroSlot.y + 80, 26, "#aaa");
                            if (heroSlot.cd > 0 && heroSlot.activeTimer <= 0) heroSlot.cd--;
                        } else {
                            ctx.fillStyle = "lime"; ctx.fillRect(heroSlot.x + 140, heroSlot.y + 110, 250, 15);
                            drawText("발동! (터치)", heroSlot.x + 270, heroSlot.y + 80, 30, "red");
                        }

                        if (timeStopFrames > 0) timeStopFrames--;
                        if (invincibleFrames > 0) invincibleFrames--;
                        frameCount++;
                    } else if (gameState === 'gameover') {
                        ctx.fillStyle = "rgba(0, 0, 0, 0.8)"; ctx.fillRect(0, 0, W, H);
                        drawText(`패배: 스테이지 ${currentStage} 에서 무림의 심장이 멎었습니다`, W / 2, H / 2 - 40, 80, "red");
                        drawText("남은 코인은 전부 소멸되니, 수호 관청에서 비급을 연마 후 새로고침 하시오.", W / 2, H / 2 + 50, 40, "white");
                        drawText("危", W / 2, H / 2 + 150, 180, "rgba(255, 71, 87, 0.8)");
                    }

                    ctx.restore();
                }
            }
        }

        updateUI();
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
