<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>강철의 난: 무림수호맹 V13.2 - 무결점 최적화</title>
    <style>
        /* 용병 선택 시 버튼 딤드 처리 스타일 */
        .merc-btn.dimmed {
            filter: grayscale(100%) brightness(0.5); /* 흑백 및 어둡게 처리 */
            opacity: 0.5; /* 반투명 처리 */
            cursor: not-allowed; /* 클릭 불가 커서 */
            pointer-events: none; /* 클릭 이벤트 차단 */
            animation: none !important; /* 반짝이는 애니메이션 중지 */
        }
        /* === 기본 인게임 스타일 === */
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            position: fixed; /* 모바일 밀림 방지 최적화 */
            top: 0;
            left: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            overscroll-behavior: none; /* 당겨서 새로고침 등 모바일 기본 액션 방지 */
            font-family: 'Malgun Gothic', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            color: white;
            /* touch-action: none; 삭제! (팝업창 내부 스크롤 방해 원인 타파) */
        }

        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
        }

        /* 1920x1080 표준 규격 레이어 통합 및 정중앙 고정 */
        #gameCanvas, #uiLayer, .screen {
            position: absolute;
            width: 1920px;
            height: 1080px;
            top: 50%;
            left: 50%;
            transform-origin: center center;
            transform: translate(-50%, -50%);
        }

        #gameCanvas {
            background-color: #e8e6d9;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        #uiLayer {
            z-index: 10;
            pointer-events: none;
        }

        .screen {
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #1a1a2e 0%, #000000 100%);
            pointer-events: auto;
            display: none;
            box-sizing: border-box;
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
        }

        h1 {
            font-size: 100px;
            color: #f1c40f;
            margin: 0;
        }

        /* HUD 및 팝업 */
        .hud-panel {
            position: absolute;
            top: 15px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            border: 2px solid #f1c40f;
            padding: 16px 30px;
            border-radius: 8px;
            pointer-events: auto;
            display: flex;
            gap: 30px;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            z-index: 10;
        }

        .coin-text {
            font-size: 28px;
            font-weight: bold;
            color: #f1c40f;
            text-shadow: 1px 1px 3px #000;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .hud-btn {
            background: linear-gradient(180deg, #e67e22 0%, #d35400 100%);
            color: white;
            border: 1px solid #f39c12;
            padding: 16px 32px;
            font-size: 26px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            transition: 0.2s;
            text-shadow: 1px 1px 2px #000;
        }

            .hud-btn:hover {
                background: linear-gradient(180deg, #f39c12 0%, #e67e22 100%);
                transform: translateY(-2px);
                box-shadow: 0 4px 8px rgba(243, 156, 18, 0.4);
            }

        /* 중간 보스 UI */
        #midBossUI {
            position: absolute;
            top: 20px;
            right: 650px;
            display: none;
            z-index: 100;
            pointer-events: auto;
        }

        @keyframes pulseAlert {
            0% {
                transform: scale(1);
                box-shadow: 0 0 5px #c0392b;
            }

            50% {
                transform: scale(1.15);
                box-shadow: 0 0 20px #e74c3c;
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 5px #c0392b;
            }
        }

        #midBossIconBtn {
            background: #2c3e50;
            color: white;
            border: 2px solid #e74c3c;
            border-radius: 50%;
            width: 70px;
            height: 70px;
            font-size: 34px;
            cursor: pointer;
            animation: pulseAlert 1.2s infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
        }

            #midBossIconBtn:hover {
                filter: brightness(1.2);
            }

        #midBossPrompt {
            display: none;
            position: absolute;
            top: 85px;
            right: 0;
            background: rgba(20, 20, 20, 0.95);
            border: 2px solid #e74c3c;
            padding: 20px;
            border-radius: 8px;
            width: 320px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }

        .mid-boss-prompt-text {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .mid-boss-btn-group {
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .mb-btn {
            width: 80px;
            height: 50px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 22px;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }

            .mb-btn.accept {
                background: #27ae60;
                border: 1px solid #2ecc71;
            }

                .mb-btn.accept:hover {
                    background: #2ecc71;
                    transform: scale(1.1);
                }

            .mb-btn.decline {
                background: #c0392b;
                border: 1px solid #e74c3c;
            }

                .mb-btn.decline:hover {
                    background: #e74c3c;
                    transform: scale(1.1);
                }

        #upgradePopup {
            display: none;
            position: relative;
            pointer-events: auto;
            width: 96%;
            height: 96%;
            max-width: 1920px;
            max-height: 1080px;
            aspect-ratio: 16 / 9;
            background: #1a1a1a;
            border: 3px solid #f1c40f;
            border-radius: 12px;
            flex-direction: column;
            padding: 25px;
            box-sizing: border-box;
            box-shadow: 0 0 50px rgba(0,0,0,0.95);
            z-index: 100;
            margin: auto;
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

            .popup-header h1 {
                margin: 0;
                color: #f1c40f;
                font-size: 42px;
                text-shadow: 2px 2px 4px #000;
            }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        @keyframes blinkWarning {
            50% {
                opacity: 0.5;
                color: #fff;
            }
        }

        #gameOverWarning {
            display: none;
            color: #ff4757;
            font-size: 22px;
            font-weight: bold;
            animation: blinkWarning 1s infinite;
            text-shadow: 1px 1px 3px #000;
        }

        .close-btn {
            background: #2980b9;
            color: white;
            border: none;
            font-size: 22px;
            padding: 12px 25px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

            .close-btn:hover {
                filter: brightness(1.2);
                transform: scale(1.05);
            }

        .hard-reset-btn {
            background: #c0392b;
            color: white;
            border: none;
            font-size: 20px;
            padding: 12px 20px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.2s;
        }

            .hard-reset-btn:hover {
                background: #e74c3c;
            }

        .popup-body {
            display: flex;
            flex: 1;
            gap: 20px;
            overflow: hidden;
            touch-action: pan-y; /* 모바일 내부 스크롤 허용 */
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #111;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }

            ::-webkit-scrollbar-thumb:hover {
                background: #f1c40f;
            }

        .tree-section {
            flex: 2;
            background: #222;
            border-radius: 8px;
            border: 1px solid #444;
            padding: 20px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            align-content: flex-start;
        }

        .hero-section {
            flex: 1;
            background: #1a1a2e;
            border-radius: 8px;
            border: 2px solid #8e44ad;
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            box-shadow: inset 0 0 30px rgba(142, 68, 173, 0.2);
        }

        .skill-branch {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
            background: rgba(255,255,255,0.03);
            padding: 20px 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .skill-title {
            font-size: 30px;
            font-weight: bold;
            margin-bottom: 5px;
            padding-bottom: 8px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            width: 95%;
            text-align: center;
            text-shadow: 1px 1px 2px #000;
        }

        .skill-desc {
            font-size: 16px;
            color: #bdc3c7;
            margin-bottom: 20px;
            text-align: center;
        }

        .nodes-grid {
            --grid-gap: 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--grid-gap);
            width: 100%;
            padding: 10px 0;
            position: relative;
        }

        .node-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .node {
            width: 130px;
            height: 130px;
            background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%);
            border: 3px solid #7f8c8d;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
            z-index: 2;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

            .node:hover:not(.locked) {
                border-color: #f1c40f;
                transform: scale(1.08) translateY(-2px);
                box-shadow: 0 6px 15px rgba(241, 196, 15, 0.4);
            }

            .node.max {
                border-color: #27ae60;
                box-shadow: 0 0 15px rgba(39, 174, 96, 0.6);
                background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            }

            .node.locked {
                filter: grayscale(100%) brightness(0.4);
                cursor: not-allowed;
                border-color: #111;
            }

                .node.locked::after {
                    content: '🔒';
                    position: absolute;
                    font-size: 36px;
                    opacity: 0.8;
                }

            .node span {
                color: white;
                font-size: 16px;
                font-weight: bold;
                text-align: center;
                line-height: 1.1;
                word-break: keep-all;
                padding: 0 4px;
                text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            }

            .node .lvl {
                color: #f1c40f;
                font-size: 14px;
                margin-top: 4px;
                font-weight: bold;
                background: rgba(0,0,0,0.5);
                padding: 3px 10px;
                border-radius: 10px;
            }

        .hero-section h2 {
            color: #f1c40f;
            font-size: 32px;
            margin-top: 0;
            text-align: center;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
            margin-bottom: 20px;
            width: 100%;
            flex-shrink: 0;
        }

        .hero-live2d-box {
            width: 75%;
            aspect-ratio: 5 / 6;
            background: rgba(0,0,0,0.6);
            border: 2px dashed #9b59b6;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 20px;
            box-shadow: inset 0 0 20px #000;
            flex-shrink: 0;
        }

        .hero-spine-text {
            color: rgba(255,255,255,0.4);
            font-size: 24px;
            font-weight: bold;
            position: absolute;
            top: 20px;
        }

        .hero-name-big {
            font-size: 44px;
            font-weight: bold;
            z-index: 2;
            margin-top: auto;
            margin-bottom: 35px;
            text-shadow: 2px 2px 5px #000;
        }

        .hero-desc-box {
            text-align: center;
            color: #bdc3c7;
            font-size: 18px;
            margin-bottom: 30px;
            line-height: 1.5;
            padding: 0 15px;
            flex-shrink: 0;
        }

        .hero-upgrades {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            align-items: center;
            flex-shrink: 0;
        }

        .hero-upg-btn {
            background: rgba(0,0,0,0.5);
            border: 1px solid #7f8c8d;
            border-radius: 40px;
            padding: 8px 25px 8px 8px;
            width: 95%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }

            .hero-upg-btn:hover:not(:disabled) {
                border-color: #9b59b6;
                background: rgba(60,40,80,0.6);
                transform: translateY(-2px);
            }

            .hero-upg-btn:disabled {
                filter: grayscale(100%);
                cursor: not-allowed;
                opacity: 0.6;
            }

        .hero-upg-circle {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%);
            border: 2px solid #f1c40f;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 15px;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
            box-shadow: inset 0 0 10px #000;
        }

        .hero-upg-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-left: 15px;
            flex: 1;
            text-align: left;
        }

        .hero-upg-name {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
        }

        .hero-upg-desc {
            color: #95a5a6;
            font-size: 14px;
            margin-top: 4px;
        }

        .hero-upg-cost {
            color: #2ecc71;
            font-weight: bold;
            font-size: 20px;
        }

        /* 타이틀 스크린 */
        #titleScreen h1 {
            font-size: 120px;
            color: #f1c40f;
            text-shadow: 0 0 40px rgba(241,196,15,0.8);
            margin-bottom: 70px;
        }

        .btn-large {
            background: linear-gradient(135deg, #c0392b 0%, #e74c3c 100%);
            color: white;
            border: 3px solid #ff7979;
            padding: 25px 100px;
            font-size: 48px;
            font-weight: bold;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(192,57,43,0.5);
        }

            .btn-large:hover {
                transform: scale(1.05) translateY(-5px);
                box-shadow: 0 15px 30px rgba(192,57,43,0.8);
            }

        .hero-carousel {
            display: flex;
            align-items: center;
            gap: 80px;
            margin-bottom: 50px;
        }

        .arrow-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 120px;
            cursor: pointer;
            transition: 0.2s;
            opacity: 0.6;
            padding: 0 20px;
        }

            .arrow-btn:hover {
                opacity: 1;
                transform: scale(1.2);
                color: #f1c40f;
            }

        .hero-showcase {
            width: 500px;
            height: 650px;
            background: rgba(0,0,0,0.5);
            border: 5px solid #f1c40f;
            box-shadow: 0 0 40px rgba(241,196,15,0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

            .hero-showcase:hover {
                transform: translateY(-5px) scale(1.02);
                box-shadow: 0 15px 50px rgba(241,196,15,0.6);
                border-color: #ffda79;
            }

        #heroNameDisplay {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 15px;
            z-index: 2;
            text-shadow: 2px 2px 5px #000;
        }

        #heroDescDisplay {
            font-size: 22px;
            color: #bdc3c7;
            margin-bottom: 20px;
            text-align: center;
            padding: 0 40px;
            z-index: 2;
            line-height: 1.5;
            word-break: keep-all;
        }

        #mapArea {
            width: 1500px;
            height: 850px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><rect width="100%" height="100%" fill="%23222"/><path d="M250,250 Q500,60 750,250 T1250,375 L1375,750 L125,750 Z" fill="%23333" stroke="%23555" stroke-width="6"/></svg>') no-repeat center;
            background-size: cover;
            position: relative;
            border: 5px solid #555;
            border-radius: 25px;
            box-shadow: inset 0 0 60px #000;
        }

        .map-node {
            position: absolute;
            width: 60px;
            height: 60px;
            background: #e74c3c;
            border: 4px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

            .map-node:hover {
                transform: translate(-50%, -50%) scale(1.3);
                box-shadow: 0 0 25px #e74c3c;
            }

            .map-node.locked {
                background: #555;
                border-color: #333;
                cursor: not-allowed;
            }

        .map-label {
            position: absolute;
            top: -45px;
            white-space: nowrap;
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 6px #000;
        }

        #stageContainer {
            width: 1100px;
            height: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            overflow-y: auto;
            padding: 30px;
            background: rgba(0,0,0,0.6);
            border: 3px solid #f1c40f;
            border-radius: 20px;
            touch-action: pan-y; /* 모바일 내부 스크롤 허용 */
        }

        .stage-node {
            width: 85%;
            padding: 30px;
            background: linear-gradient(90deg, #2c3e50 0%, #34495e 100%);
            border: 3px solid #7f8c8d;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 36px;
            font-weight: bold;
            transition: 0.2s;
            flex-shrink: 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

            .stage-node:hover {
                border-color: #f1c40f;
                background: linear-gradient(90deg, #e67e22 0%, #d35400 100%);
                transform: scale(1.02);
            }

            .stage-node.locked {
                filter: grayscale(100%);
                opacity: 0.5;
                cursor: not-allowed;
            }

        .top-bar {
            position: absolute;
            top: 40px;
            left: 60px;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            color: #bdc3c7;
            text-shadow: 2px 2px 5px #000;
            z-index: 10;
        }

            .top-bar:hover {
                color: #fff;
            }

        /* === 용병모집 및 버프 가로 배치 UI === */
        .top-ui-wrapper {
            position: absolute;
            left: 20px;
            top: 15px;
            display: flex;
            align-items: flex-start;
            gap: 20px;
            z-index: 10;
            pointer-events: none;
            width: auto;
        }

        #mercenaryUI {
            display: flex;
            align-items: center;
            gap: 25px;
            background: rgba(0,0,0,0.85);
            padding: 16px 26px;
            border: 2px solid #00d2d3;
            border-radius: 10px;
            pointer-events: auto;
            box-shadow: 0 0 15px rgba(0,210,211,0.5);
            flex-shrink: 0;
            transition: filter 0.3s;
        }

        .merc-title {
            color: #0abde3;
            font-weight: bold;
            font-size: 26px;
            text-shadow: 0 0 5px #0abde3;
            text-align: center;
            line-height: 1.2;
        }

        .merc-gauge-container {
            width: 220px;
            height: 35px;
            background: #222;
            border: 2px solid #00d2d3;
            border-radius: 18px;
            overflow: hidden;
            position: relative;
        }

        #mercGaugeFill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00d2d3 0%, #0abde3 100%);
            transition: width 0.3s;
        }

        .merc-slots-wrapper {
            display: flex;
            gap: 10px;
        }

        .merc-slot {
            width: 65px;
            height: 65px;
            background: #111;
            border: 2px solid #f1c40f;

        function buyUpgrade(catId, statKey) {
            let lvl = upgrades[catId][statKey]; let detail = statDetails[statKey];

                if (upgrades[req.reqCat][req.reqStat] < req.reqLvl) return;

            let idx = skillCategories.find(c => c.id === catId).stats.indexOf(statKey);
            if (idx > 0 && upgrades[catId][skillCategories.find(c => c.id === catId).stats[idx - 1]] < 5) return;

            let cost = detail.base;
            if (metaCoins >= cost) { metaCoins -= cost; upgrades[catId][statKey]++; saveGame(); renderPopup(); }
        }

                        else if (idx === 2) html += `<div style="position:absolute; top:50%; left:50%; width:100%; height:4px; background:${lineColor}; z-index:0; margin-top:-2px; ${shadow}"></div>`;

                    html += `   <div class="node ${isMax ? 'max' : ''} ${isLocked ? 'locked' : ''}" onclick="buyUpgrade('${cat.id}', '${statKey}')">

        function getBase(key, baseVal) {
            let catId = getCategoryForKey(key); if (!catId) return baseVal;
            let lvl = upgrades[catId][key]; if (!lvl) return baseVal;

            if (key === 'atkMelee' || key === 'atkRanged') return (baseVal + (lvl * 0.5)) * (1 + mercBuffAtk);
            if (key === 'atkSpeed') return (lvl * 0.005) + mercBuffSpd;
            if (key === 'lifesteal') return (lvl * 0.01);

            if (key === 'hp') return baseVal + (lvl * 3);
            if (key === 'def') return lvl * 0.3;
            if (key === 'critRate') return 0.2 + (lvl * 0.005);
            if (key === 'critDmg') return 2.0 + (lvl * 0.02);
            if (key === 'regenHP') return lvl > 0 ? Math.max(1, baseVal + Math.floor(lvl * 0.3)) : baseVal;
            if (key === 'respawnReduc') return Math.max(50, baseVal - (lvl * 1.2));
            if (key === 'costReduc') return lvl * 0.004;
            if (key === 'coinGain') return lvl * 0.01;
            return baseVal;
        }

        function getActualCost(charData) {
            let discount = getBase('costReduc', 0);
            let wavePenalty = Math.pow(1.22, currentWave);
            return Math.max(10, Math.floor(charData.cost * (1 - discount) * wavePenalty));
        }

        function drawText(text, x, y, size, color = "white", align = "center") {
            ctx.save(); ctx.fillStyle = color; ctx.font = `bold ${size}px 'Malgun Gothic', sans-serif`; ctx.textAlign = align; ctx.textBaseline = "middle";
            ctx.strokeStyle = "rgba(0,0,0,0.9)"; ctx.lineWidth = size >= 30 ? 6 : 4; ctx.strokeText(text, Math.round(x), Math.round(y)); ctx.fillText(text, Math.round(x), Math.round(y)); ctx.restore();
        }

        function createFloatingText(x, y, text, color, isCrit) { floatingTexts.push({ x: x, y: y, text: text, color: color, life: 20, maxLife: 20, size: isCrit ? 44 : 28, isCrit: isCrit }); }

        function triggerHeroSkill(heroId, targetLaneId) {
            let activeHeroData = heroes.find(h => h.id === heroId);
            let eff = 1 + (activeHeroData.upg.effect * 0.2);
            let cdReduc = activeHeroData.upg.cd * 0.05;

            heroSlot.activeTimer = Math.floor(166 * eff);
            heroSlot.cd = Math.floor(heroSlot.maxCd * (1 - cdReduc));
            shakeFrames = 16;

            if (heroId === 'h0') { timeStopFrames = Math.floor(166 * eff); h0BuffTimer = Math.floor(300 * eff); createFloatingText(W / 2, H / 2, "아군 공속 2배!", activeHeroData.color, true); }
            else if (heroId === 'h1') { timeStopFrames = Math.floor(166 * eff); enemies.forEach(e => { e.kbTimer = Math.floor(45 * eff); e.kbSpeed = 150 / 45; }); fieldSlots.forEach(fs => { if (fs.char) { let healAmt = Math.floor(getBase('hp', fs.char.maxHp) * 0.4); fs.char.hp = Math.min(getBase('hp', fs.char.maxHp), fs.char.hp + healAmt); createFloatingText(fs.x, fs.y - 30, `+${healAmt}`, "lime", true); } }); }
            else if (heroId === 'h2') { invincibleFrames = Math.floor(166 * eff); laneEffect = { laneId: targetLaneId, timer: Math.floor(75 * eff) }; enemies.forEach(en => { if (en.lane.id === targetLaneId) { if (en.type === 'boss' || en.type === 'midboss') { let dmg = Math.floor(en.hp * Math.min(1, 0.3 * eff)); en.hp -= dmg; createFloatingText(en.x, en.y - 80, `-${dmg}`, activeHeroData.color, true); } else { en.hp = 0; createFloatingText(en.x, en.y - 80, `절명!`, activeHeroData.color, true); } } }); }
            else if (heroId === 'h3') { timeStopFrames = 0; enemies.forEach(en => { let dmg = Math.floor(en.hp * Math.min(1, (en.type === 'boss' || en.type === 'midboss' ? 0.1 : 0.5) * eff)); en.hp -= dmg; en.hitAnim = 6; if (en.type !== 'boss' && en.type !== 'midboss') { en.kbTimer = Math.floor(45 * eff); en.kbSpeed = 150 / 45; } createFloatingText(en.x, en.y - 80, `-${dmg}`, activeHeroData.color, true); }); }
            else if (heroId === 'h4') { timeStopFrames = Math.floor(166 * eff); enemies.forEach(en => { let dmg = Math.floor(en.hp * Math.min(1, (en.type === 'boss' || en.type === 'midboss' ? 0.2 : 0.5) * eff)); en.hp -= dmg; en.hitAnim = 6; createFloatingText(en.x, en.y - 80, `-${dmg}`, activeHeroData.color, true); }); }
        }

        function activateMercenary() {
            if (gameState !== 'playing') return;

            let btn = document.getElementById('mercBtn');

            // [1단계] 게이지가 꽉 차서 '가동' 가능 상태일 때 (슬롯 돌리기 시작)
            if (mercState === 'ready') {
                mercState = 'spinning';
                glitchGauge = 0;
                updateMercUI();

                btn.innerHTML = "모집중";
                btn.classList.remove('ready');
                document.getElementById('mercTraitInfo').style.display = 'none';

                mercSpinFrames = 180; // 약 3초간 회전 연출

                let rand = Math.random();
                let rands = [];
                mercRewardType = Math.random() < 0.30 ? 'buff' : 'merc'; // 30% 확률로 영구 버프, 70% 확률로 용병 유닛
                mercFinalTier = 0;

                // 결과 티어 결정 (확률 로직)

                                                        else { fs.char.state = 'dead'; fs.char.timer = getBase('respawnReduc', 250); fs.char.hp = getBase('hp', fs.char.maxHp); fs.char = null; }
                                                    }
                                                });
                                            }
                                            s.char.cd = actualMaxCd;
                                        } else { s.char.cd--; }
                                    } else if (s.char.attackType === 'melee') {
                                        if (s.char.cd <= 0) {
                                            let isCrit = Math.random() < getBase('critRate', 0);
                                            let finalDmg = isCrit ? Math.floor(finalBaseDmg * getBase('critDmg', 0)) : finalBaseDmg;

                                            if (s.char.role.includes('근거리') || s.char.role.includes('엘리트')) {
                                                s.char.strikeAnim = 6;
                                                let dist = Math.hypot(target.x - s.x, target.y - s.y);
                                                s.char.strikeDirX = dist > 0 ? (target.x - s.x) / dist : shootDir;
                                                s.char.strikeDirY = dist > 0 ? (target.y - s.y) / dist : 0;
                                                s.char.lungeDist = Math.min(s.char.range, Math.max(0, dist - 40));
                                                target.hp -= finalDmg; target.hitAnim = 4;
                                                applyLifesteal(s.char, finalDmg);
                                                createFloatingText(target.x, target.y - 50, Math.floor(finalDmg), isCrit ? "#ff3333" : "white", isCrit);
                                                if (isCrit) shakeFrames = 3;
                                            }
                                            if (s.char.role === '탱커') { s.char.jumpAnim = 10; s.char.pendingStrike = { target: target, dmg: finalDmg, isCrit: isCrit }; }

                                            s.char.cd = actualMaxCd;
                                            ctx.fillStyle = "rgba(255, 255, 255, 0.8)"; ctx.beginPath(); ctx.arc(target.x, target.y - 20, 20, 0, Math.PI * 2); ctx.fill();
                                        } else { s.char.cd--; }
                                    }
                                } else if (s.char.cd > 0) { s.char.cd--; }
                            }
                        });

                        for (let i = projectiles.length - 1; i >= 0; i--) {
                            let p = projectiles[i]; let isHit = false;

                            if (p.type === 'midbossProj') {
                                p.x += p.vx; p.y += p.vy; p.vy += p.g;
                                if (p.vy > 0 && p.y >= p.targetY) {
                                    isHit = true; p.tx = p.x; p.ty = p.targetY;
                                    let explosionRadius = 120;
                                    fieldSlots.forEach(fs => {
                                        if (fs.char && Math.hypot(fs.x - p.tx, fs.y - p.ty) < explosionRadius) {
                                            let dmg = p.damage;
                                            if (invincibleFrames > 0 || fs.char.id === 999) dmg = 0;
                                            fs.char.hp -= dmg;
                                            createFloatingText(fs.x, fs.y - 30, `-${dmg}`, "#e74c3c", true);
                                            if (fs.char.hp <= 0 && invincibleFrames <= 0) {
                                                if (fs.char.id > 100) fs.char = null;
                                                else { fs.char.state = 'dead'; fs.char.timer = getBase('respawnReduc', 250); fs.char.hp = getBase('hp', fs.char.maxHp); fs.char = null; }
                                            }
                                        }
                                    });
                                    ctx.fillStyle = "rgba(142, 68, 173, 0.6)"; ctx.beginPath(); ctx.arc(p.tx, p.ty, explosionRadius, 0, Math.PI * 2); ctx.fill();
                                }
                            }
                            else if (p.type === 'parabola' || p.type === 'heal_parabola') { p.x += p.vx; p.y += p.vy; p.vy += p.g; if (p.vy > 0 && p.y >= p.targetY) { isHit = true; p.tx = p.x; p.ty = p.targetY; } }
                            else if (p.type === 'pierce') { p.progress += 0.035; p.x = p.startX + (p.tx - p.startX) * p.progress; p.y = p.startY + (p.ty - p.startY) * p.progress; if (p.progress >= 1) isHit = true; let enemiesInLane = enemies.filter(e => e.lane.id === p.laneId); enemiesInLane.forEach(e => { if (!p.hitTargets.includes(e) && Math.abs(e.x - p.x) < 50) { p.hitTargets.push(e); let reduction = Math.pow(0.7, p.hitTargets.length - 1); let currentDmg = Math.max(1, Math.floor(p.baseDmg * reduction)); let finalDmg = p.isCrit ? Math.floor(currentDmg * getBase('critDmg', 0)) : currentDmg; e.hp -= finalDmg; e.hitAnim = 6; applyLifesteal(p.char, finalDmg); createFloatingText(e.x, e.y - 30, Math.floor(finalDmg), p.isCrit ? "#ff3333" : "white", p.isCrit); if (p.isCrit) shakeFrames = 3; } }); }
                            else {
                                if (p.char && p.char.projType === 'beam') {
                                    p.progress += 0.06; p.x = p.startX + (p.tx - p.startX) * p.progress; p.y = p.startY;
                                    if (p.progress >= 1) { isHit = true; p.tx = p.x; p.ty = p.y; }
                                } else {
                                    p.progress += 0.084; p.x = p.startX + (p.tx - p.startX) * p.progress; p.y = p.startY + (p.ty - p.startY) * p.progress;
                                    if (p.progress >= 1) { isHit = true; p.tx = p.x; p.ty = p.y; }
                                }
                            }

                            ctx.save(); ctx.fillStyle = p.color || (p.char ? p.char.color : 'red');
                            if (p.type === 'heal_parabola') { ctx.beginPath(); ctx.arc(p.x, p.y, 20, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(p.x - 8, p.y); ctx.lineTo(p.x + 8, p.y); ctx.moveTo(p.x, p.y - 8); ctx.lineTo(p.x, p.y + 8); ctx.stroke(); }
                            else if (p.type === 'midbossProj') { ctx.beginPath(); ctx.arc(p.x, p.y, 18, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = "#e74c3c"; ctx.lineWidth = 3; ctx.stroke(); }
                            else if (p.type === 'pierce') { ctx.translate(p.x, p.y); ctx.rotate(frameCount * 0.4); ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(20, 0); ctx.lineTo(0, 20); ctx.lineTo(-20, 0); ctx.closePath(); ctx.fill(); }
                            else if (p.char && p.char.projType === 'beam') {
                                ctx.translate(p.x, p.y); ctx.fillStyle = p.char.color;
                                ctx.beginPath(); ctx.ellipse(0, 0, 45, 8, 0, 0, Math.PI * 2); ctx.fill();
                            }
                            else { ctx.beginPath(); ctx.arc(p.x, p.y, 14, 0, Math.PI * 2); ctx.fill(); } ctx.restore();

                            if (isHit && p.type !== 'midbossProj') {
                                if (p.type === 'heal_parabola') { if (p.target.state === 'deployed') { p.target.hp = Math.min(getBase('hp', p.target.maxHp), p.target.hp + p.heal); createFloatingText(p.tx, p.ty - 20, `+${Math.floor(p.heal)}`, "#2ecc71", true); } }
                                else if (p.type === 'enemyProj') { let hitSlots = fieldSlots.filter(fs => fs.char && Math.hypot(fs.x - p.tx, fs.y - p.ty) < 60); if (hitSlots.length > 0) { hitSlots.sort((a, b) => b.x - a.x); let hitSlot = hitSlots[0]; let fHit = Math.max(1, p.damage - getBase('def', 0)); if (invincibleFrames > 0 || hitSlot.char.id === 999) fHit = 0; hitSlot.char.hp -= fHit; createFloatingText(hitSlot.x, hitSlot.y - 30, `-${fHit}`, "#e74c3c", true); if (invincibleFrames > 0) createFloatingText(hitSlot.x, hitSlot.y - 40, "무적!", "gold", false); if (hitSlot.char.hp <= 0 && invincibleFrames <= 0) { if (hitSlot.char.id === 999 || hitSlot.char.id > 100) { hitSlot.char = null; } else { hitSlot.char.state = 'dead'; hitSlot.char.timer = getBase('respawnReduc', 250); hitSlot.char.hp = getBase('hp', hitSlot.char.maxHp); hitSlot.char = null; } } } }
                                else if (p.type !== 'pierce') {
                                    if (p.isMiss) { ctx.fillStyle = "rgba(100, 100, 100, 0.5)"; ctx.beginPath(); ctx.arc(p.tx, p.ty, 40, 0, Math.PI * 2); ctx.fill(); createFloatingText(p.tx, p.ty, "Miss", "#aaa", false); }
                                    else {
                                        let finalDmg = p.isCrit ? Math.floor(p.baseDmg * getBase('critDmg', 0)) : p.baseDmg; if (p.isCrit) shakeFrames = 8;
                                        if (p.char.aoe) {
                                            let explosionRadius = p.char.aoeRadius || 180;
                                            enemies.forEach(e => { if (Math.hypot(e.x - p.tx, e.y - p.ty) < explosionRadius) { e.hp -= finalDmg; e.hitAnim = 6; applyLifesteal(p.char, finalDmg); if (p.char.poison) e.poisoned = true; createFloatingText(e.x, e.y - 30, Math.floor(finalDmg), p.isCrit ? "#ff3333" : "white", p.isCrit); } });
                                            if (p.char.friendlyFire) { fieldSlots.forEach(fs => { if (fs.char && Math.hypot(fs.x - p.tx, fs.y - p.ty) < explosionRadius) { let friendlyDmg = Math.floor(finalDmg * 0.2); if (invincibleFrames > 0 || fs.char.id === 999) friendlyDmg = 0; fs.char.hp -= friendlyDmg; createFloatingText(fs.x, fs.y - 50, `-${friendlyDmg}`, "#ff0000", false); if (fs.char.hp <= 0 && invincibleFrames <= 0) { if (fs.char.id === 999 || fs.char.id > 100) { fs.char = null; } else { fs.char.state = 'dead'; fs.char.timer = getBase('respawnReduc', 250); fs.char.hp = getBase('hp', fs.char.maxHp); fs.char = null; } } } }); } ctx.fillStyle = "rgba(231, 76, 60, 0.6)"; ctx.beginPath(); ctx.arc(p.tx, p.ty, explosionRadius, 0, Math.PI * 2); ctx.fill();
                                        } else { let hitEnemy = null; let enemiesInLane = enemies.filter(e => e.lane.id === p.laneId); if (enemiesInLane.length > 0) { enemiesInLane.sort((a, b) => Math.abs(a.x - p.tx) - Math.abs(b.x - p.tx)); hitEnemy = enemiesInLane[0]; } if (hitEnemy) { hitEnemy.hp -= finalDmg; hitEnemy.hitAnim = 6; applyLifesteal(p.char, finalDmg); if (p.char.poison) hitEnemy.poisoned = true; if (p.char.slow && hitEnemy.type !== 'boss' && hitEnemy.type !== 'midboss') hitEnemy.slowTimer = 75; createFloatingText(hitEnemy.x, hitEnemy.y - 30, Math.floor(finalDmg), p.isCrit ? "#ff3333" : "white", p.isCrit); } }
                                    }
                                }
                            }
                            projectiles.splice(i, 1);
                        } else if (isHit && p.type === 'midbossProj') {
                            projectiles.splice(i, 1);
                        }
                    }

                    for (let i = floatingTexts.length - 1; i >= 0; i--) { let ft = floatingTexts[i]; ft.y -= 3; ft.life--; ctx.globalAlpha = Math.max(0, ft.life / ft.maxLife); drawText(ft.isCrit ? `CRIT! ${ft.text}` : ft.text, ft.x, ft.y, ft.size, ft.color); ctx.globalAlpha = 1.0; if (ft.life <= 0) floatingTexts.splice(i, 1); }

                    // UI 렌더링 (하단 슬롯)
                    ctx.fillStyle = "#1a1a1a"; ctx.fillRect(0, 880, W, 200); ctx.strokeStyle = "#555"; ctx.lineWidth = 4; ctx.strokeRect(0, 880, W, 200);

                    ctx.fillStyle = "rgba(0,0,0,0.8)";
                    ctx.fillRect(20, 900, 280, 160);
                    ctx.strokeStyle = "#f1c40f";
                    ctx.lineWidth = 3;
                    ctx.strokeRect(20, 900, 280, 160);
                    drawText(`[ 관문 ${currentStage}/10 ]`, 160, 935, 26, "#2ecc71");
                    let remainSec = Math.ceil(waveTimer / 60);
                    let waveStr = currentWave === 9 ? "웨이브 10/10 (보스전)" : `웨이브 ${currentWave + 1}/10 (${remainSec}초)`;
                    drawText(waveStr, 160, 985, 24, "#3498db");
                    drawText(`에너지: ${baseEnergy}% 危`, 160, 1030, 26, "#ff4757");

                    const slotWidth = 125;
                    const deckStartX = W / 2 - (deck.length * slotWidth) / 2;

                    deck.forEach((char, i) => {
                        const bx = deckStartX + (i * slotWidth); const slotHeight = 160;
                        ctx.strokeStyle = (selectedInvenIdx === i) ? "gold" : "#333"; ctx.lineWidth = 4; ctx.strokeRect(bx, 910, slotWidth, slotHeight);

                        let slotInnerW = slotWidth - 4; let slotInnerH = 110; let actualCost = getActualCost(char);

                        if (char.state === 'deployed') {
                            ctx.fillStyle = "#111"; ctx.fillRect(bx + 2, 912, slotInnerW, slotInnerH);
                            drawText("배치됨", bx + (slotWidth / 2), 965, 22, "#555");
                        }
                        else if (char.state === 'waiting' || char.state === 'dead') {
                            char.timer--; if (char.timer <= 0) char.state = 'ready';
                            ctx.fillStyle = char.color; ctx.fillRect(bx + 2, 912, slotInnerW, slotInnerH);
                            let maxT = char.state === 'dead' ? getBase('respawnReduc', 250) : 125;
                            let ratio = char.timer / maxT;
                            ctx.fillStyle = "rgba(0, 0, 0, 0.75)"; ctx.fillRect(bx + 2, 912, slotInnerW, slotInnerH * ratio);
                            drawText(char.state === 'dead' ? "운기조식" : "대기중", bx + (slotWidth / 2), 965, 20, "#ff4757");
                        }
                        else {
                            char.hp = getBase('hp', char.maxHp);
                            ctx.fillStyle = char.color; ctx.fillRect(bx + 2, 912, slotInnerW, slotInnerH);
                            ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(bx + 2, 912, slotInnerW, 30);
                            drawText(`💰 ${actualCost}`, bx + (slotWidth / 2), 927, 18, battleCoins >= actualCost ? "#f1c40f" : "#e74c3c");
                        }

                        drawText(char.name, bx + (slotWidth / 2), 1035, 18, (char.state === 'ready') ? "white" : "#7f8c8d");
                        drawText(`[${char.role}]`, bx + (slotWidth / 2), 1055, 14, (char.state === 'ready') ? "#f1c40f" : "#7f8c8d");

                        if (char.state === 'ready' && char.hp < getBase('hp', char.maxHp)) {
                            ctx.fillStyle = "red"; ctx.fillRect(bx + 15, 1075, slotWidth - 30, 6);
                            ctx.fillStyle = "lime"; ctx.fillRect(bx + 15, 1075, (slotWidth - 30) * (char.hp / getBase('hp', char.maxHp)), 6);
                        }
                    });

                    ctx.strokeStyle = "#555"; ctx.lineWidth = 3; ctx.strokeRect(heroSlot.x, heroSlot.y, heroSlot.w, heroSlot.h);
                    let activeHeroObj = heroes.find(h => h.id === equippedHero);
                    ctx.fillStyle = activeHeroObj.color; ctx.fillRect(heroSlot.x + 20, heroSlot.y + 30, 100, 100);
                    drawText(activeHeroObj.name, heroSlot.x + 270, heroSlot.y + 45, 32, "white");

                    if (heroSlot.cd > 0 || heroSlot.activeTimer > 0) {
                        let ratio = heroSlot.activeTimer > 0 ? (heroSlot.activeTimer / heroSlot.maxActive) : (1 - heroSlot.cd / heroSlot.maxCd);
                        ctx.fillStyle = heroSlot.activeTimer > 0 ? "red" : "yellow"; ctx.fillRect(heroSlot.x + 140, heroSlot.y + 110, 250 * ratio, 15);
                        drawText(heroSlot.activeTimer > 0 ? "심판의 일격!!" : "내공 축적 중...", heroSlot.x + 270, heroSlot.y + 80, 26, "#aaa");
                        if (heroSlot.cd > 0 && heroSlot.activeTimer <= 0) heroSlot.cd--;
                    }
                    else {
                        ctx.fillStyle = "lime"; ctx.fillRect(heroSlot.x + 140, heroSlot.y + 110, 250, 15);
                        drawText("발동! (터치)", heroSlot.x + 270, heroSlot.y + 80, 30, "red");
                    }

                    if (heroSlot.activeTimer > 0) { ctx.fillStyle = "rgba(142, 68, 173, 0.25)"; ctx.fillRect(0, 0, W, H); drawText(`${activeHeroObj.name} 강림!!`, W / 2, H / 2, 120, activeHeroObj.color); heroSlot.activeTimer--; }
                    if (invincibleFrames > 0) { drawText("무적 발동!", W / 2, H / 2 - 150, 80, "gold"); }
                    if (showWaveWarning > 0) { let warnAlpha = Math.abs(Math.sin(showWaveWarning * 0.1)); drawText("🚨 기계 마신왕 강림 경고 🚨", W / 2, H / 2 - 100, 100, `rgba(255, 71, 87, ${warnAlpha})`); showWaveWarning--; }

                    if (timeStopFrames > 0) timeStopFrames--; if (invincibleFrames > 0) invincibleFrames--; frameCount++;
                }
                    else if (gameState === 'gameover') {
                    ctx.fillStyle = "#000000";
                    ctx.fillRect(0, 0, W, H);
                    drawText(`패배: 제 ${currentStage} 관문에서 쓰러졌소...`, W / 2, H / 2 - 120, 70, "#ff4757");
                    drawText("危", W / 2, H / 2 - 270, 150, "rgba(255, 71, 87, 0.8)");

                    let bonusMeta = Math.floor(battleCoins * 0.1);
                    drawText(`남은 전투 코인 ${battleCoins}의 10%가 전환되어`, W / 2, H / 2 - 10, 24, "#bdc3c7");
                    drawText(`천기 영석 ${bonusMeta}개를 획득하였소!`, W / 2, H / 2 + 30, 28, "#00d2d3");

                    ctx.fillStyle = "#c0392b"; ctx.fillRect(W / 2 - 180, H / 2 + 90, 360, 90);
                    ctx.strokeStyle = "#f1c40f"; ctx.lineWidth = 4; ctx.strokeRect(W / 2 - 180, H / 2 + 90, 360, 90);
                    drawText("🔙 타이틀로 귀환", W / 2, H / 2 + 135, 40, "white");
                }

                ctx.restore();
            }
        }
        }

        loadGame();
        showScreen('titleScreen');
        requestAnimationFrame(gameLoop);
    </script>
