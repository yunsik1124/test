<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>강철의 난: 무림수호맹 V13.10 - 스케일 복원 및 전술 고도화</title>
    <style>
        /* 기존 CSS 동일 유지 */
        .merc-btn.dimmed {
            filter: grayscale(100%) brightness(0.6) !important;
            opacity: 0.6 !important;
            cursor: not-allowed !important;
            pointer-events: none !important;
            animation: none !important;
            box-shadow: none !important;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            display: block;
        }

        #gameContainer {
            position: absolute;
            width: 1920px;
            height: 1080px;
            background-color: #e8e6d9;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transform-origin: 0 0;
            top: 0;
            left: 0;
            transition: background-image 0.5s ease-in-out;
        }

        #gameCanvas, #uiLayer, #bottomUiLayer, .screen {
            position: absolute;
            width: 1920px;
            height: 1080px;
            top: 0;
            left: 0;
            transform-origin: top left;
        }

        #gameCanvas {
            z-index: 20;
            pointer-events: none;
            background: transparent;
        }

        #uiLayer {
            z-index: 30;
            pointer-events: none;
        }

        #bottomUiLayer {
            z-index: 5;
            pointer-events: none;
        }

        .screen {
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #1a1a2e 0%, #000000 100%);
            pointer-events: auto;
            display: none;
            box-sizing: border-box;
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
        }

        h1 {
            font-size: 100px;
            color: #f1c40f;
            margin: 0;
        }

        .hud-panel {
            position: absolute;
            top: 15px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            border: 2px solid #f1c40f;
            padding: 10px 20px;
            border-radius: 8px;
            pointer-events: auto;
            display: flex;
            gap: 30px;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            z-index: 10;
        }

        .coin-text {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .coin-display-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 220px;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 1px 1px 3px #000;
        }

            .coin-display-row span:last-child {
                text-align: right;
                flex-grow: 1;
            }

        .hud-btn {
            background: linear-gradient(180deg, #e67e22 0%, #d35400 100%);
            color: white;
            border: 1px solid #f39c12;
            padding: 16px 28px;
            font-size: 26px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 8px;
            transition: 0.2s;
            text-shadow: 1px 1px 2px #000;
        }

            .hud-btn:hover {
                background: linear-gradient(180deg, #f39c12 0%, #e67e22 100%);
                transform: translateY(-2px);
            }

        #midBossUI {
            position: absolute;
            top: 150px;
            right: 50px;
            display: none;
            z-index: 100;
            pointer-events: auto;
        }

        @keyframes pulseAlert {
            0% {
                transform: scale(1);
                box-shadow: 0 0 5px #c0392b;
            }

            50% {
                transform: scale(1.15);
                box-shadow: 0 0 20px #e74c3c;
            }

            100% {
                transform: scale(1);
                box-shadow: 0 0 5px #c0392b;
            }
        }

        #midBossIconBtn {
            background: #2c3e50;
            color: white;
            border: 2px solid #e74c3c;
            border-radius: 50%;
            width: 120px;
            height: 120px;
            font-size: 70px;
            cursor: pointer;
            animation: pulseAlert 1.2s infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
        }

            #midBossIconBtn:hover {
                filter: brightness(1.2);
            }

        #midBossPrompt {
            display: none;
            position: absolute;
            top: 85px;
            right: 0;
            background: rgba(20, 20, 20, 0.95);
            border: 2px solid #e74c3c;
            padding: 20px;
            border-radius: 8px;
            width: 400px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }

        .mid-boss-prompt-text {
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            margin-bottom: 20px;
            line-height: 1.6;
        }

            .mid-boss-prompt-text span {
                display: block;
                margin-top: 10px;
                font-size: 30px !important;
                color: #00d2d3 !important;
                text-shadow: 0 0 10px rgba(0, 210, 211, 0.5);
            }

        .mid-boss-btn-group {
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .mb-btn {
            width: 70px;
            height: 50px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 22px;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }

            .mb-btn.accept {
                background: #27ae60;
                border: 1px solid #2ecc71;
            }

                .mb-btn.accept:hover {
                    background: #2ecc71;
                    transform: scale(1.1);
                }

            .mb-btn.decline {
                background: #c0392b;
                border: 1px solid #e74c3c;
            }

                .mb-btn.decline:hover {
                    background: #e74c3c;
                    transform: scale(1.1);
                }

        #upgradePopup {
            display: none;
            position: relative;
            pointer-events: auto;
            width: 96%;
            height: 96%;
            max-width: 1920px;
            max-height: 1080px;
            aspect-ratio: 16/9;
            background: #1a1a1a;
            border: 3px solid #f1c40f;
            border-radius: 12px;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 0 50px rgba(0,0,0,0.95);
            z-index: 100;
            margin: auto;
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

            .popup-header h1 {
                margin: 0;
                color: #f1c40f;
                font-size: 48px;
                text-shadow: 2px 2px 4px #000;
            }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        @keyframes blinkWarning {
            50% {
                opacity: 0.5;
                color: #fff;
            }
        }

        #gameOverWarning {
            display: none;
            color: #ff4757;
            font-size: 22px;
            font-weight: bold;
            animation: blinkWarning 1s infinite;
            text-shadow: 1px 1px 3px #000;
        }

        .close-btn {
            background: #2980b9;
            color: white;
            border: none;
            font-size: 24px;
            padding: 12px 30px;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
            transition: 0.2s;
        }

            .close-btn:hover {
                filter: brightness(1.2);
                transform: scale(1.05);
            }

        .hard-reset-btn {
            background: #c0392b;
            color: white;
            border: none;
            font-size: 20px;
            padding: 12px 25px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.2s;
        }

            .hard-reset-btn:hover {
                background: #e74c3c;
            }

        .popup-body {
            display: flex;
            flex: 1;
            gap: 20px;
            overflow: hidden;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #111;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

            ::-webkit-scrollbar-thumb:hover {
                background: #f1c40f;
            }

        .tree-section {
            flex: 2;
            background: #222;
            border-radius: 8px;
            border: 1px solid #444;
            padding: 15px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            align-content: flex-start;
        }

        .hero-section {
            flex: 1;
            background: #1a1a2e;
            border-radius: 8px;
            border: 2px solid #8e44ad;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
        }

        .skill-branch {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
            background: rgba(255,255,255,0.03);
            padding: 20px 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .skill-title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            width: 90%;
            text-align: center;
        }

        .skill-desc {
            font-size: 16px;
            color: #bdc3c7;
            margin-bottom: 30px;
            text-align: center;
        }

        .nodes-grid {
            --grid-gap: 40px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: var(--grid-gap);
            width: 100%;
            padding: 15px 0;
            position: relative;
        }

        .node-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .node {
            width: 210px;
            height: 210px;
            background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%);
            border: 3px solid #7f8c8d;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
            z-index: 2;
        }

            .node:hover:not(.locked) {
                border-color: #f1c40f;
                transform: scale(1.08) translateY(-2px);
            }

            .node.max {
                border-color: #27ae60;
                background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            }

            .node.locked {
                filter: grayscale(100%) brightness(0.4);
                cursor: not-allowed;
                border-color: #111;
            }

                .node.locked::after {
                    content: '🔒';
                    position: absolute;
                    font-size: 60px;
                    opacity: 0.8;
                }

            .node span {
                color: white;
                font-size: 26px;
                font-weight: bold;
                text-align: center;
                line-height: 1.2;
                word-break: keep-all;
                padding: 0 8px;
            }

            .node .lvl {
                color: #f1c40f;
                font-size: 22px;
                margin-top: 6px;
                font-weight: bold;
                background: rgba(0,0,0,0.5);
                padding: 4px 12px;
                border-radius: 10px;
            }

        .hero-section h2 {
            color: #f1c40f;
            margin-top: 0;
            text-align: center;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 15px;
            margin-bottom: 20px;
            font-size: 30px;
            width: 100%;
            flex-shrink: 0;
        }

        .hero-live2d-box {
            width: 70%;
            aspect-ratio: 5/6;
            background: rgba(0,0,0,0.6);
            border: 2px dashed #9b59b6;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .hero-spine-text {
            color: rgba(255,255,255,0.4);
            font-size: 24px;
            font-weight: bold;
            position: absolute;
            top: 20px;
        }

        .hero-name-big {
            font-size: 44px;
            font-weight: bold;
            z-index: 2;
            margin-top: auto;
            margin-bottom: 35px;
        }

        .hero-desc-box {
            text-align: center;
            color: #bdc3c7;
            font-size: 18px;
            margin-bottom: 35px;
            line-height: 1.5;
            padding: 0 10px;
            flex-shrink: 0;
        }

        .hero-upgrades {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            align-items: center;
            flex-shrink: 0;
        }

        .hero-upg-btn {
            background: rgba(0,0,0,0.5);
            border: 1px solid #7f8c8d;
            border-radius: 50px;
            padding: 12px 25px 12px 12px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }

            .hero-upg-btn:hover:not(:disabled) {
                border-color: #9b59b6;
                background: rgba(60,40,80,0.6);
                transform: translateY(-2px);
            }

            .hero-upg-btn:disabled {
                filter: grayscale(100%);
                cursor: not-allowed;
                opacity: 0.6;
            }

        .hero-upg-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #34495e 0%, #2c3e50 100%);
            border: 2px solid #f1c40f;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            font-weight: bold;
            color: white;
            flex-shrink: 0;
        }

        .hero-upg-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-left: 18px;
            flex: 1;
            text-align: left;
        }

        .hero-upg-name {
            color: #fff;
            font-size: 22px;
            font-weight: bold;
        }

        .hero-upg-desc {
            color: #95a5a6;
            font-size: 14px;
            margin-top: 5px;
        }

        .hero-upg-cost {
            color: #2ecc71;
            font-weight: bold;
            font-size: 22px;
        }

        #titleScreen h1 {
            font-size: 120px;
            color: #f1c40f;
            text-shadow: 0 0 40px rgba(241,196,15,0.8);
            margin-bottom: 70px;
        }

        .btn-large {
            background: linear-gradient(135deg, #c0392b 0%, #e74c3c 100%);
            color: white;
            border: 3px solid #ff7979;
            padding: 25px 100px;
            font-size: 48px;
            font-weight: bold;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(192,57,43,0.5);
        }

            .btn-large:hover {
                transform: scale(1.05) translateY(-5px);
                box-shadow: 0 15px 30px rgba(192,57,43,0.8);
            }

        .hero-carousel {
            display: flex;
            align-items: center;
            gap: 80px;
            margin-bottom: 50px;
        }

        .arrow-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 120px;
            cursor: pointer;
            transition: 0.2s;
            opacity: 0.6;
            padding: 0 20px;
        }

            .arrow-btn:hover {
                opacity: 1;
                transform: scale(1.2);
                color: #f1c40f;
            }

        .hero-showcase {
            width: 500px;
            height: 650px;
            background: rgba(0,0,0,0.5);
            border: 5px solid #f1c40f;
            box-shadow: 0 0 40px rgba(241,196,15,0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

            .hero-showcase:hover {
                transform: translateY(-5px) scale(1.02);
                border-color: #ffda79;
            }

        #heroNameDisplay {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 15px;
            z-index: 2;
            text-shadow: 2px 2px 5px #000;
        }

        #heroDescDisplay {
            font-size: 22px;
            color: #bdc3c7;
            margin-bottom: 20px;
            text-align: center;
            padding: 0 40px;
            z-index: 2;
            line-height: 1.5;
            word-break: keep-all;
        }

        #mapArea {
            width: 1500px;
            height: 850px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><rect width="100%" height="100%" fill="%23222"/><path d="M250,250 Q500,60 750,250 T1250,375 L1375,750 L125,750 Z" fill="%23333" stroke="%23555" stroke-width="6"/></svg>') no-repeat center;
            background-size: cover;
            position: relative;
            border: 5px solid #555;
            border-radius: 25px;
            box-shadow: inset 0 0 60px #000;
        }

        .map-node {
            position: absolute;
            width: 60px;
            height: 60px;
            background: #e74c3c;
            border: 4px solid #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

            .map-node:hover {
                transform: translate(-50%, -50%) scale(1.3);
                box-shadow: 0 0 25px #e74c3c;
            }

            .map-node.locked {
                background: #555;
                border-color: #333;
                cursor: not-allowed;
            }

        .map-label {
            position: absolute;
            top: -45px;
            white-space: nowrap;
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 6px #000;
        }

        #stageContainer {
            width: 1100px;
            height: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            overflow-y: auto;
            padding: 30px;
            background: rgba(0,0,0,0.6);
            border: 3px solid #f1c40f;
            border-radius: 20px;
        }

        .stage-node {
            width: 85%;
            padding: 30px;
            background: linear-gradient(90deg, #2c3e50 0%, #34495e 100%);
            border: 3px solid #7f8c8d;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            font-size: 36px;
            font-weight: bold;
            transition: 0.2s;
            flex-shrink: 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

            .stage-node:hover {
                border-color: #f1c40f;
                background: linear-gradient(90deg, #e67e22 0%, #d35400 100%);
                transform: scale(1.02);
            }

            .stage-node.locked {
                filter: grayscale(100%);
                opacity: 0.5;
                cursor: not-allowed;
            }

        .top-bar {
            position: absolute;
            top: 40px;
            left: 60px;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            color: #bdc3c7;
            text-shadow: 2px 2px 5px #000;
            z-index: 10;
        }

            .top-bar:hover {
                color: #fff;
            }

        .top-ui-wrapper {
            position: absolute;
            left: 20px;
            top: 20px;
            display: flex;
            align-items: flex-start;
            gap: 15px;
            pointer-events: none;
            width: auto;
        }

        #mercenaryUI {
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(0,0,0,0.85);
            padding: 8px 15px;
            border: 2px solid #00d2d3;
            border-radius: 12px;
            pointer-events: auto;
            box-shadow: 0 0 15px rgba(0,210,211,0.5);
            flex-shrink: 0;
            transition: filter 0.3s;
        }

        .merc-title {
            color: #0abde3;
            font-weight: bold;
            font-size: 28px;
            text-shadow: 0 0 5px #0abde3;
            text-align: center;
            line-height: 1.2;
        }

        .merc-gauge-container {
            width: 220px;
            height: 35px;
            background: #222;
            border: 2px solid #00d2d3;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
        }

        #mercGaugeFill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00d2d3 0%, #0abde3 100%);
            transition: width 0.3s;
        }

        .merc-slots-wrapper {
            display: flex;
            gap: 10px;
        }

        .merc-slot {
            width: 75px;
            height: 75px;
            background: #111;
            border: 2px solid #f1c40f;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            box-shadow: inset 0 0 10px #000;
        }

        .merc-btn-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .merc-btn {
            background: #111;
            color: #0abde3;
            border: 2px solid #00d2d3;
            width: 100px;
            height: 100px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            opacity: 0.6;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            line-height: 1.2;
            box-sizing: border-box;
            word-break: keep-all;
        }

            .merc-btn.ready {
                background: #00d2d3;
                color: #fff;
                box-shadow: 0 0 15px #0abde3;
                opacity: 1;
                animation: glitchBlink 1s infinite alternate;
            }

        #mercTraitInfo {
            display: none;
            position: absolute;
            top: 105px;
            color: #f1c40f;
            font-size: 26px;
            font-weight: bold;
            text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000, -2px 0px 0 #000, 2px 0px 0 #000, 0px -2px 0 #000, 0px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0 0 10px rgba(241, 196, 15, 0.5);
            pointer-events: none;
            white-space: nowrap;
        }

                            ctx.save(); ctx.fillStyle = p.color || (p.char ? p.char.color : 'red');
                            if (p.type === 'heal_parabola') { ctx.beginPath(); ctx.arc(p.x, p.y, 20, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(p.x - 8, p.y); ctx.lineTo(p.x + 8, p.y); ctx.moveTo(p.x, p.y - 8); ctx.lineTo(p.x, p.y + 8); ctx.stroke(); }
                            else if (p.type === 'midbossProj') { ctx.beginPath(); ctx.arc(p.x, p.y, 18, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = "#e74c3c"; ctx.lineWidth = 3; ctx.stroke(); }
                            else if (p.type === 'pierce') { ctx.translate(p.x, p.y); ctx.rotate(frameCount * 0.4); ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(20, 0); ctx.lineTo(0, 20); ctx.lineTo(-20, 0); ctx.closePath(); ctx.fill(); }
                            else if (p.char && p.char.projType === 'beam') { ctx.translate(p.x, p.y); ctx.fillStyle = p.char.color; ctx.beginPath(); ctx.ellipse(0, 0, 45, 8, 0, 0, Math.PI * 2); ctx.fill(); }
                            else { ctx.beginPath(); ctx.arc(p.x, p.y, 14, 0, Math.PI * 2); ctx.fill(); } ctx.restore();

                            if (isHit && p.type !== 'midbossProj') {
                                if (p.type === 'heal_parabola') { if (p.target.state === 'deployed') { p.target.hp = Math.min(getBase('hp', p.target.maxHp), p.target.hp + p.heal); createFloatingText(p.tx, p.ty - 20, `+${Math.floor(p.heal)}`, "#2ecc71", true); } }
                                else if (p.type === 'enemyProj') { let hitSlots = fieldSlots.filter(fs => fs.char && Math.hypot(fs.x - p.tx, fs.y - p.ty) < 60); if (hitSlots.length > 0) { hitSlots.sort((a, b) => b.x - a.x); let hitSlot = hitSlots[0]; let fHit = Math.max(1, p.damage - getBase('def', 0)); if (invincibleFrames > 0 || hitSlot.char.id === 999) fHit = 0; hitSlot.char.hp -= fHit; createFloatingText(hitSlot.x, hitSlot.y - 30, `-${fHit}`, "#e74c3c", true); if (invincibleFrames > 0) createFloatingText(hitSlot.x, hitSlot.y - 40, "무적!", "gold", false); if (hitSlot.char.hp <= 0 && invincibleFrames <= 0) { if (hitSlot.char.id === 999 || hitSlot.char.id > 7) { hitSlot.char = null; } else { hitSlot.char.state = 'dead'; hitSlot.char.timer = getBase('respawnReduc', 250); hitSlot.char.hp = getBase('hp', hitSlot.char.maxHp); hitSlot.char = null; } } } }

                                            let explosionRadius = p.char.aoeRadius || 180;
                                            enemies.forEach(e => { if (Math.hypot(e.x - p.tx, e.y - p.ty) < explosionRadius) { e.hp -= finalDmg; e.hitAnim = 6; applyLifesteal(p.char, finalDmg); if (p.char.poison) e.poisoned = true; createFloatingText(e.x, e.y - 30, Math.floor(finalDmg), p.isCrit ? "#ff3333" : "white", p.isCrit); } });
                                            if (p.char.friendlyFire) { fieldSlots.forEach(fs => { if (fs.char && Math.hypot(fs.x - p.tx, fs.y - p.ty) < explosionRadius) { let friendlyDmg = Math.floor(finalDmg * 0.2); if (invincibleFrames > 0 || fs.char.id === 999) friendlyDmg = 0; fs.char.hp -= friendlyDmg; createFloatingText(fs.x, fs.y - 50, `-${friendlyDmg}`, "#ff0000", false); if (fs.char.hp <= 0 && invincibleFrames <= 0) { if (fs.char.id === 999 || fs.char.id > 7) { fs.char = null; } else { fs.char.state = 'dead'; fs.char.timer = getBase('respawnReduc', 250); fs.char.hp = getBase('hp', fs.char.maxHp); fs.char = null; } } } }); } ctx.fillStyle = "rgba(231, 76, 60, 0.6)"; ctx.beginPath(); ctx.arc(p.tx, p.ty, explosionRadius, 0, Math.PI * 2); ctx.fill();
                                        } else { let hitEnemy = null; let enemiesInLane = enemies.filter(e => e.lane.id === p.laneId); if (enemiesInLane.length > 0) { enemiesInLane.sort((a, b) => Math.abs(a.x - p.tx) - Math.abs(b.x - p.tx)); hitEnemy = enemiesInLane[0]; } if (hitEnemy) { hitEnemy.hp -= finalDmg; hitEnemy.hitAnim = 6; applyLifesteal(p.char, finalDmg); if (p.char.poison) hitEnemy.poisoned = true; if (p.char.slow && hitEnemy.type !== 'boss' && hitEnemy.type !== 'midboss') hitEnemy.slowTimer = 75; createFloatingText(hitEnemy.x, hitEnemy.y - 30, Math.floor(finalDmg), p.isCrit ? "#ff3333" : "white", p.isCrit); } }
                                    }
                                }

                        }

                        for (let i = floatingTexts.length - 1; i >= 0; i--) { let ft = floatingTexts[i]; ft.y -= 3; ft.life--; ctx.globalAlpha = Math.max(0, ft.life / ft.maxLife); drawText(ft.isCrit ? `CRIT! ${ft.text}` : ft.text, ft.x, ft.y, ft.size, ft.color); ctx.globalAlpha = 1.0; if (ft.life <= 0) floatingTexts.splice(i, 1); }

                        ctx.fillStyle = "#1a1a1a"; ctx.fillRect(0, 880, W, 200); ctx.strokeStyle = "#555"; ctx.lineWidth = 4; ctx.strokeRect(0, 880, W, 200);
                        ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(20, 900, 210, 160); ctx.strokeStyle = "#f1c40f"; ctx.lineWidth = 3; ctx.strokeRect(20, 900, 210, 160);
                        drawText(`[ 관문 ${currentStage}/10 ]`, 125, 935, 26, "#2ecc71"); let remainSec = Math.ceil(waveTimer / 60); let waveStr = currentWave === 9 ? "보스전" : `Wave ${currentWave + 1} (${remainSec})`; drawText(waveStr, 125, 985, 26, "#3498db"); drawText(`HP: ${baseEnergy}% 危`, 125, 1030, 26, "#ff4757");

                        const slotWidth = 150;
                        const deckStartX = 280;
                        const slotY = 885;

                        deck.forEach((char, i) => {
                            const bx = deckStartX + (i * (slotWidth + 10));
                            const isSelected = (selectedInvenIdx === i);

                            let innerMargin = 6;
                            let slotInnerW = slotWidth - (innerMargin * 2);

                            ctx.strokeStyle = isSelected ? "gold" : "#333";

                            let actualCost = getActualCost(char);

                            let img = getImage(char.id, 'char');
                            if (char.state === 'deployed') {
                                ctx.fillStyle = "#111";
                                ctx.fillRect(bx + innerMargin, slotY + innerMargin, slotInnerW, squareH);

                            }

                                } else {
                                    ctx.fillStyle = char.color; ctx.fillRect(bx + innerMargin, slotY + innerMargin, slotInnerW, squareH);
                                }

                                if (isSelected) {
                                    ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
                                    ctx.fillRect(bx + innerMargin, slotY + innerMargin, slotInnerW, squareH);

                                ctx.fillStyle = "rgba(0,0,0,0.7)";
                                ctx.fillRect(bx + innerMargin, slotY + innerMargin, slotInnerW, 35);

                        });

                        ctx.strokeStyle = "#555"; ctx.lineWidth = 3; ctx.strokeRect(heroSlot.x, heroSlot.y, heroSlot.w, heroSlot.h);
                        let activeHeroObj = heroes.find(h => h.id === equippedHero);

                            ctx.fillStyle = heroSlot.activeTimer > 0 ? "red" : "yellow"; ctx.fillRect(heroSlot.x + 140, heroSlot.y + 120, 250 * ratio, 15);

                            if (heroSlot.cd > 0 && heroSlot.activeTimer <= 0) heroSlot.cd--;
                        } else {

                        }
